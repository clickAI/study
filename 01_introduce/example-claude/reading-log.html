<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>독서 기록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Noto+Serif+KR:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5efe4;
    --bg-soft: #ece4d4;
    --surface: #fbf6ec;
    --surface-hover: #f7f0e1;
    --text: #2b2018;
    --text-muted: #8b7a65;
    --text-soft: #6b5d4b;
    --border: #d9cab1;
    --border-soft: #e6dbc4;
    --accent: #6b3410;
    --accent-soft: #a05a2b;
    --accent-bg: #e8d9c0;
    --shadow: 0 1px 3px rgba(70, 50, 30, 0.06), 0 4px 12px rgba(70, 50, 30, 0.04);
    --shadow-lg: 0 8px 32px rgba(70, 50, 30, 0.12), 0 2px 6px rgba(70, 50, 30, 0.06);
    --radius: 8px;
    --radius-lg: 14px;
    --serif: 'Cormorant Garamond', 'Noto Serif KR', Georgia, serif;
    --sans: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(160, 90, 43, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(107, 52, 16, 0.04) 0%, transparent 50%);
  }

  .container {
    max-width: 1240px;
    margin: 0 auto;
    padding: 56px 32px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .brand h1 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 44px;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.1;
  }

  .brand .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: 16px;
    color: var(--text-muted);
    letter-spacing: 0.01em;
  }

  .btn {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    padding: 11px 20px;
    border-radius: var(--radius);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--text);
    color: var(--bg);
  }

  .btn:hover { background: var(--accent); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn-ghost {
    background: transparent;
    color: var(--text-soft);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface); color: var(--text); transform: none; }

  .btn-danger {
    background: transparent;
    color: #a04444;
    border: 1px solid #d9c0c0;
  }
  .btn-danger:hover { background: #f5e8e8; color: #842c2c; transform: none; }

  /* Calendar nav */
  .nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 24px;
  }

  .nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    color: var(--text-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .nav button:hover { background: var(--accent-bg); color: var(--accent); }

  .month-label {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 500;
    color: var(--text);
    min-width: 200px;
    text-align: center;
    letter-spacing: 0.01em;
  }

  /* Calendar grid */
  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--border-soft);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .day-header {
    background: var(--bg-soft);
    padding: 14px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .day-header.sun { color: #c47272; }
  .day-header.sat { color: #7a8bb0; }

  .day-cell {
    background: var(--surface);
    min-height: 130px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
    transition: background 0.15s;
  }

  .day-cell.empty { background: var(--bg-soft); opacity: 0.4; }

  .day-cell.today { background: var(--surface-hover); }
  .day-cell.today .date-num {
    background: var(--accent);
    color: var(--bg);
  }

  .date-num {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 500;
    color: var(--text-soft);
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    align-self: flex-start;
  }

  .day-cell.sun .date-num { color: #c47272; }
  .day-cell.sat .date-num { color: #7a8bb0; }

  /* Book card on calendar */
  .book-mini {
    display: flex;
    gap: 7px;
    padding: 5px;
    background: var(--bg-soft);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }

  .book-mini:hover {
    background: var(--accent-bg);
    border-color: var(--border);
    transform: translateY(-1px);
  }

  .book-mini img {
    width: 28px;
    height: 40px;
    object-fit: cover;
    border-radius: 3px;
    box-shadow: 0 1px 3px rgba(70, 50, 30, 0.2);
    background: var(--border);
    flex-shrink: 0;
  }

  .book-mini-info {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .book-mini-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.25;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .book-mini-author {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon {
    font-family: var(--serif);
    font-size: 64px;
    margin-bottom: 12px;
    color: var(--border);
  }
  .empty-state p {
    font-family: var(--serif);
    font-style: italic;
    font-size: 17px;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(43, 32, 24, 0.4);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 460px;
    padding: 32px;
    border: 1px solid var(--border-soft);
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal h2 {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }
  .modal .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 22px;
  }

  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .field input {
    width: 100%;
    padding: 11px 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field input:focus {
    outline: none;
    border-color: var(--accent-soft);
    box-shadow: 0 0 0 3px rgba(160, 90, 43, 0.12);
  }

  .date-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
  }

  .error-msg {
    color: #a04444;
    font-size: 13px;
    margin-top: 8px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* Book detail modal */
  .detail-modal {
    max-width: 520px;
  }
  .detail-content {
    display: flex;
    gap: 22px;
    margin-bottom: 20px;
  }
  .detail-content img {
    width: 130px;
    height: 190px;
    object-fit: cover;
    border-radius: 6px;
    box-shadow: var(--shadow-lg);
    background: var(--border);
    flex-shrink: 0;
  }
  .detail-info {
    flex: 1;
    min-width: 0;
  }
  .detail-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    line-height: 1.25;
    color: var(--text);
    margin-bottom: 6px;
  }
  .detail-author {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 14px;
    font-style: italic;
  }
  .detail-period {
    display: inline-block;
    background: var(--accent-bg);
    color: var(--accent);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .detail-link {
    display: block;
    margin-top: 14px;
    font-size: 12px;
    color: var(--accent-soft);
    text-decoration: none;
    word-break: break-all;
  }
  .detail-link:hover { text-decoration: underline; }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid currentColor;
    border-right-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 60px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  @media (max-width: 720px) {
    .container { padding: 32px 16px 60px; }
    .brand h1 { font-size: 32px; }
    .month-label { font-size: 22px; min-width: 140px; }
    .day-cell { min-height: 90px; padding: 6px; }
    .date-num { font-size: 13px; width: 22px; height: 22px; }
    .book-mini img { width: 22px; height: 32px; }
    .book-mini-title { font-size: 10px; }
    .book-mini-author { display: none; }
    .day-header { font-size: 10px; padding: 10px 4px; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <h1>독서 기록</h1>
        <div class="tagline">A quiet log of pages turned</div>
      </div>
      <button class="btn" id="addBtn">
        <span>+</span><span>책 추가하기</span>
      </button>
    </header>

    <div class="nav">
      <button id="prevBtn" aria-label="이전 달">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button id="nextBtn" aria-label="다음 달">›</button>
    </div>

    <div class="calendar" id="calendar"></div>

    <footer>"A reader lives a thousand lives before he dies."</footer>
  </div>

  <!-- Add book modal -->
  <div class="modal-backdrop" id="addModal">
    <div class="modal">
      <h2>책 추가하기</h2>
      <div class="subtitle">교보문고 링크와 독서 기간을 입력해주세요</div>

      <div class="field">
        <label for="bookUrl">교보문고 책 링크</label>
        <input type="url" id="bookUrl" placeholder="https://product.kyobobook.co.kr/detail/..." autocomplete="off">
      </div>

      <div class="date-row">
        <div class="field">
          <label for="startDate">시작일</label>
          <input type="date" id="startDate">
        </div>
        <div class="field">
          <label for="endDate">종료일</label>
          <input type="date" id="endDate">
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <div class="modal-actions">
        <button class="btn btn-ghost" id="cancelBtn">취소</button>
        <button class="btn" id="saveBtn">저장</button>
      </div>
    </div>
  </div>

  <!-- Book detail modal -->
  <div class="modal-backdrop" id="detailModal">
    <div class="modal detail-modal">
      <div class="detail-content">
        <img id="detailImage" src="" alt="">
        <div class="detail-info">
          <div class="detail-title" id="detailTitle"></div>
          <div class="detail-author" id="detailAuthor"></div>
          <div class="detail-period" id="detailPeriod"></div>
          <a class="detail-link" id="detailLink" target="_blank" rel="noopener"></a>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-danger" id="deleteBtn">삭제</button>
        <button class="btn btn-ghost" id="closeDetailBtn">닫기</button>
      </div>
    </div>
  </div>

<script>
'use strict';

// ---------- Storage ----------
const STORAGE_KEY = 'reading-log-books-v1';

function loadBooks() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch (e) {
    return [];
  }
}

function saveBooks(books) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
}

// ---------- Date utils ----------
function formatDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function todayStr() { return formatDateStr(new Date()); }

// ---------- Kyobobook parsing via Jina ----------
async function fetchBookInfo(url) {
  const jinaUrl = 'https://r.jina.ai/' + url;
  const res = await fetch(jinaUrl, { headers: { 'Accept': 'text/plain' } });
  if (!res.ok) throw new Error('Jina 요청 실패 (' + res.status + ')');
  const text = await res.text();
  return parseBookInfo(text);
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// Parse the "Title: <book> | <author> - 교보문고" header Jina prepends.
function parseMetaHeader(markdown) {
  const m = markdown.match(/^Title:\s*(.+)$/m);
  if (!m) return { title: '', author: '' };
  let raw = m[1].trim().replace(/\s*-\s*교보문고\s*$/, '').trim();
  const parts = raw.split('|').map(s => s.trim()).filter(Boolean);
  if (parts.length >= 2) {
    return { title: parts.slice(0, -1).join(' | '), author: parts[parts.length - 1] };
  }
  return { title: parts[0] || '', author: '' };
}

function parseBookInfo(markdown) {
  const AUTHOR_SEP = ' · ';
  const meta = parseMetaHeader(markdown);

  // Title: prefer the first non-page-title H1 (richer); fall back to meta header.
  let title = '';
  const headingRegex = /^# (.+)$/gm;
  let m;
  while ((m = headingRegex.exec(markdown)) !== null) {
    const candidate = m[1].trim();
    if (!candidate || candidate.includes('교보문고')) continue;
    title = candidate;
    break;
  }
  if (!title) title = meta.title;

  // Author: try the inline "[Name](link) , [Name](link) 저자(글)" pattern first.
  let author = '';
  const authorInlineMatch = markdown.match(/((?:\[[^\]\n]+\]\([^\)\n]+\)[\s,·、]*)+)\s*저자\(글\)/);
  if (authorInlineMatch) {
    const names = [...authorInlineMatch[1].matchAll(/\[([^\]\n]+)\]/g)].map(x => x[1].trim()).filter(Boolean);
    author = [...new Set(names)].join(AUTHOR_SEP);
  }
  if (!author) {
    const headingAuthors = [...markdown.matchAll(/###\s*저자\(글\)\s*\[([^\]\n]+)\]/g)].map(x => x[1].trim());
    if (headingAuthors.length) author = [...new Set(headingAuthors)].join(AUTHOR_SEP);
  }
  if (!author) {
    const looseMatch = markdown.match(/((?:\[[^\]\n]+\]\([^\)\n]+\)[\s,·、]*)+)\s*저자/);
    if (looseMatch) {
      const names = [...looseMatch[1].matchAll(/\[([^\]\n]+)\]/g)].map(x => x[1].trim()).filter(Boolean);
      author = [...new Set(names)].join(AUTHOR_SEP);
    }
  }
  // Final fallback: author from the meta header.
  if (!author && meta.author) author = meta.author;

  // Image: prefer "대표 이미지"; then a /pdt/ thumbnail whose alt matches the title;
  // then any /pdt/ thumbnail.
  let image = '';
  const repImgMatch = markdown.match(/!\[[^\]]*대표 이미지[^\]]*\]\((https:\/\/contents\.kyobobook\.co\.kr\/[^\)]+?\.(?:jpg|jpeg|png|webp))\)/i);
  if (repImgMatch) image = repImgMatch[1];
  if (!image && title) {
    const titleRe = new RegExp(
      '!\\[(?:Image\\s+\\d+:\\s*)?' + escapeRegex(title) + '[^\\]]*\\]\\((https:\\/\\/contents\\.kyobobook\\.co\\.kr\\/[^\\)]+?\\/pdt\\/[^\\)]+?\\.(?:jpg|jpeg|png|webp))\\)',
      'i'
    );
    const titleImgMatch = markdown.match(titleRe);
    if (titleImgMatch) image = titleImgMatch[1];
  }
  if (!image) {
    const pdtImgMatch = markdown.match(/(https:\/\/contents\.kyobobook\.co\.kr\/sih\/[^\s\)]+?\/pdt\/[^\s\)]+?\.(?:jpg|jpeg|png|webp))/i);
    if (pdtImgMatch) image = pdtImgMatch[1];
  }

  if (!title) throw new Error('책 제목을 찾을 수 없습니다. 교보문고 링크가 맞는지 확인해주세요.');

  return { title, author: author || '저자 미상', image };
}

// ---------- Calendar rendering ----------
let viewDate = new Date();
viewDate.setDate(1);

function renderCalendar() {
  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();

  document.getElementById('monthLabel').textContent = `${year}. ${String(month + 1).padStart(2, '0')}`;

  const calendar = document.getElementById('calendar');
  calendar.innerHTML = '';

  const days = ['일', '월', '화', '수', '목', '금', '토'];
  days.forEach((d, i) => {
    const h = document.createElement('div');
    h.className = 'day-header' + (i === 0 ? ' sun' : i === 6 ? ' sat' : '');
    h.textContent = d;
    calendar.appendChild(h);
  });

  const firstDay = new Date(year, month, 1);
  const startDow = firstDay.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = todayStr();
  const books = loadBooks();

  for (let i = 0; i < startDow; i++) {
    const empty = document.createElement('div');
    empty.className = 'day-cell empty';
    calendar.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    const dow = new Date(year, month, d).getDay();
    cell.className = 'day-cell' + (dow === 0 ? ' sun' : dow === 6 ? ' sat' : '');

    const dateStr = formatDateStr(new Date(year, month, d));
    if (dateStr === today) cell.classList.add('today');

    const num = document.createElement('div');
    num.className = 'date-num';
    num.textContent = d;
    cell.appendChild(num);

    for (const book of books) {
      if (book.startDate <= dateStr && dateStr <= book.endDate) {
        const bm = document.createElement('div');
        bm.className = 'book-mini';
        bm.dataset.bookId = book.id;
        const img = document.createElement('img');
        img.src = book.image || '';
        img.alt = '';
        img.loading = 'lazy';
        img.onerror = () => { img.style.visibility = 'hidden'; };
        const info = document.createElement('div');
        info.className = 'book-mini-info';
        const t = document.createElement('div');
        t.className = 'book-mini-title';
        t.textContent = book.title;
        const a = document.createElement('div');
        a.className = 'book-mini-author';
        a.textContent = book.author;
        info.appendChild(t);
        info.appendChild(a);
        bm.appendChild(img);
        bm.appendChild(info);
        bm.addEventListener('click', () => openDetail(book.id));
        cell.appendChild(bm);
      }
    }

    calendar.appendChild(cell);
  }
}

// ---------- Add modal ----------
const addModal = document.getElementById('addModal');
const detailModal = document.getElementById('detailModal');

function openAddModal() {
  document.getElementById('bookUrl').value = '';
  const today = todayStr();
  document.getElementById('startDate').value = today;
  document.getElementById('endDate').value = today;
  document.getElementById('errorMsg').classList.remove('show');
  addModal.classList.add('open');
  setTimeout(() => document.getElementById('bookUrl').focus(), 50);
}

function closeAddModal() {
  addModal.classList.remove('open');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

async function handleSave() {
  const url = document.getElementById('bookUrl').value.trim();
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  const saveBtn = document.getElementById('saveBtn');
  document.getElementById('errorMsg').classList.remove('show');

  if (!url) return showError('교보문고 링크를 입력해주세요.');
  if (!startDate || !endDate) return showError('독서 기간을 입력해주세요.');
  if (startDate > endDate) return showError('종료일은 시작일 이후여야 합니다.');
  if (!/kyobobook\.co\.kr/.test(url)) return showError('교보문고 링크가 맞는지 확인해주세요.');

  saveBtn.disabled = true;
  saveBtn.innerHTML = '<span class="spinner"></span>불러오는 중…';
  try {
    const info = await fetchBookInfo(url);
    const books = loadBooks();
    books.push({
      id: Date.now() + '-' + Math.random().toString(36).slice(2, 7),
      url, startDate, endDate,
      title: info.title,
      author: info.author,
      image: info.image,
      addedAt: new Date().toISOString(),
    });
    saveBooks(books);
    closeAddModal();
    // Jump view to the start month of the new book
    const [y, m] = startDate.split('-').map(Number);
    viewDate = new Date(y, m - 1, 1);
    renderCalendar();
  } catch (e) {
    showError(e.message || '책 정보를 불러오지 못했습니다.');
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = '저장';
  }
}

// ---------- Detail modal ----------
let currentDetailId = null;

function openDetail(id) {
  const books = loadBooks();
  const book = books.find(b => b.id === id);
  if (!book) return;
  currentDetailId = id;
  document.getElementById('detailImage').src = book.image || '';
  document.getElementById('detailTitle').textContent = book.title;
  document.getElementById('detailAuthor').textContent = book.author;
  document.getElementById('detailPeriod').textContent = `${book.startDate}  →  ${book.endDate}`;
  const link = document.getElementById('detailLink');
  link.href = book.url;
  link.textContent = book.url;
  detailModal.classList.add('open');
}

function closeDetail() {
  detailModal.classList.remove('open');
  currentDetailId = null;
}

function deleteCurrent() {
  if (!currentDetailId) return;
  if (!confirm('이 기록을 삭제하시겠어요?')) return;
  const books = loadBooks().filter(b => b.id !== currentDetailId);
  saveBooks(books);
  closeDetail();
  renderCalendar();
}

// ---------- Event wiring ----------
document.getElementById('addBtn').addEventListener('click', openAddModal);
document.getElementById('cancelBtn').addEventListener('click', closeAddModal);
document.getElementById('saveBtn').addEventListener('click', handleSave);
document.getElementById('closeDetailBtn').addEventListener('click', closeDetail);
document.getElementById('deleteBtn').addEventListener('click', deleteCurrent);

document.getElementById('prevBtn').addEventListener('click', () => {
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1);
  renderCalendar();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1);
  renderCalendar();
});

// Close modals on backdrop click + Esc
[addModal, detailModal].forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    addModal.classList.remove('open');
    detailModal.classList.remove('open');
  }
});

// Enter in URL field moves focus to start date
document.getElementById('bookUrl').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('startDate').focus(); }
});

renderCalendar();
</script>
</body>
</html>
