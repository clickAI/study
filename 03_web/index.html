document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"ko\"><head>\n<meta charset=\"utf-8\">\n<title>웹<\u002Ftitle>\n<script src=\"e2adda10-6f88-4b81-b552-8b8494add799\"><\u002Fscript>\n\n<style>\n  :root {\n    --fg: #111;\n    --fg-soft: #4a4a4a;\n    --fg-mute: #8a8a8a;\n    --bg: #ffffff;\n    --rule: #e6e6e6;\n    --accent: #c84b16;\n    --code-bg: #faf8f5;\n    --font-kr: -apple-system, BlinkMacSystemFont, \"Apple SD Gothic Neo\", \"Pretendard\", \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n    --font-mono: ui-monospace, SFMono-Regular, \"SF Mono\", Menlo, Consolas, monospace;\n  }\n  html, body { background: #111; margin: 0; }\n  deck-stage { background: #111; }\n\n  section {\n    background: var(--bg);\n    color: var(--fg);\n    font-family: var(--font-kr);\n    font-weight: 400;\n    letter-spacing: -0.01em;\n    padding: 88px 110px;\n    box-sizing: border-box;\n    position: relative;\n    overflow: hidden;\n    display: flex;\n    flex-direction: column;\n  }\n\n  .eyebrow {\n    font-size: 22px;\n    color: var(--fg-mute);\n    letter-spacing: 0.02em;\n    margin-bottom: 24px;\n    font-weight: 500;\n  }\n  .eyebrow .num { color: var(--accent); margin-right: 14px; font-variant-numeric: tabular-nums; }\n\n  h1.slide-title {\n    font-size: 84px;\n    font-weight: 700;\n    line-height: 1.1;\n    margin: 0 0 56px 0;\n    letter-spacing: -0.025em;\n  }\n  h1.slide-title .accent { color: var(--accent); }\n  h1.slide-title .sub { color: var(--fg-mute); font-weight: 500; }\n\n  h2.section-sub {\n    font-size: 34px;\n    font-weight: 500;\n    color: var(--fg-soft);\n    margin: 0 0 48px 0;\n  }\n\n  ul.bullets {\n    list-style: none;\n    padding: 0;\n    margin: 0;\n    display: flex;\n    flex-direction: column;\n    gap: 26px;\n    max-width: 1500px;\n  }\n  ul.bullets li {\n    font-size: 32px;\n    line-height: 1.45;\n    color: var(--fg);\n    padding-left: 38px;\n    position: relative;\n  }\n  ul.bullets li::before {\n    content: \"\";\n    width: 10px; height: 10px;\n    border-radius: 50%;\n    background: var(--fg);\n    position: absolute;\n    left: 6px; top: 18px;\n  }\n  ul.bullets li.muted { color: var(--fg-mute); }\n  ul.bullets li.muted::before { background: var(--fg-mute); }\n  ul.bullets li code, ul.bullets li .mono {\n    font-family: var(--font-mono);\n    font-size: 0.86em;\n    background: var(--code-bg);\n    padding: 2px 8px;\n    border-radius: 4px;\n  }\n\n  .footer {\n    position: absolute;\n    bottom: 36px;\n    left: 110px;\n    right: 110px;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    font-size: 18px;\n    color: var(--fg-mute);\n    font-variant-numeric: tabular-nums;\n  }\n  .footer .brand { letter-spacing: 0.04em; }\n  .footer .pageno .total { color: #c8c8c8; }\n\n  /* Cover */\n  .cover {\n    justify-content: center;\n    align-items: flex-start;\n    padding-left: 140px;\n  }\n  .cover .kicker {\n    font-family: var(--font-mono);\n    font-size: 20px;\n    color: var(--fg-mute);\n    letter-spacing: 0.08em;\n    margin-bottom: 40px;\n  }\n  .cover h1 {\n    font-size: 220px;\n    font-weight: 700;\n    margin: 0;\n    line-height: 1;\n    letter-spacing: -0.045em;\n  }\n  .cover h1 .l2 { display: block; color: var(--accent); font-size: 100px; letter-spacing: -0.02em; margin-top: 30px; font-weight: 500; }\n  .cover .subtitle {\n    margin-top: 56px;\n    font-size: 28px;\n    color: var(--fg-soft);\n    max-width: 1100px;\n    line-height: 1.5;\n  }\n  .cover .meta {\n    position: absolute;\n    bottom: 80px;\n    left: 140px;\n    right: 140px;\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-end;\n    color: var(--fg-mute);\n    font-size: 18px;\n    font-family: var(--font-mono);\n    letter-spacing: 0.04em;\n  }\n\n  /* Section divider */\n  .divider { justify-content: center; align-items: flex-start; padding-left: 140px; }\n  .divider .chap {\n    font-family: var(--font-mono);\n    font-size: 22px;\n    color: var(--accent);\n    letter-spacing: 0.12em;\n    margin-bottom: 36px;\n  }\n  .divider h1 {\n    font-size: 120px;\n    font-weight: 700;\n    margin: 0;\n    line-height: 1.05;\n    letter-spacing: -0.03em;\n  }\n  .divider .desc {\n    margin-top: 40px;\n    font-size: 26px;\n    color: var(--fg-soft);\n    max-width: 1100px;\n    line-height: 1.5;\n  }\n\n  /* Two column */\n  .twocol {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 80px;\n    align-items: start;\n    flex: 1;\n  }\n  .twocol > .right { align-self: stretch; display: flex; align-items: center; justify-content: center; }\n\n  .codecard {\n    background: var(--code-bg);\n    border: 1px solid var(--rule);\n    border-radius: 6px;\n    padding: 28px 32px;\n    font-family: var(--font-mono);\n    font-size: 22px;\n    line-height: 1.6;\n    color: var(--fg-soft);\n    white-space: pre;\n    overflow: auto;\n  }\n  .codecard .tag { color: var(--accent); }\n  .codecard .kw  { color: #2a6fdb; }\n  .codecard .str { color: #117a3d; }\n  .codecard .com { color: #999; }\n\n  .stack-row {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 28px;\n    margin-top: 8px;\n  }\n  .stack-card {\n    border: 1px solid var(--rule);\n    border-radius: 8px;\n    padding: 26px 28px 30px;\n    background: #fff;\n    display: flex;\n    flex-direction: column;\n    gap: 14px;\n  }\n  .stack-card .label {\n    font-family: var(--font-mono);\n    font-size: 14px;\n    color: var(--fg-mute);\n    letter-spacing: 0.08em;\n  }\n  .stack-card .name {\n    font-size: 36px;\n    font-weight: 600;\n    color: var(--accent);\n    font-family: var(--font-mono);\n  }\n  .stack-card .role {\n    font-size: 22px;\n    color: var(--fg-soft);\n    line-height: 1.4;\n  }\n  .stack-card .mini {\n    margin-top: auto;\n    background: var(--code-bg);\n    border-radius: 4px;\n    padding: 12px 14px;\n    font-family: var(--font-mono);\n    font-size: 15px;\n    color: var(--fg-soft);\n    line-heigh entById('zs-load'), wpage = document.getElementById('zs-page');\n      var chipH = document.getElementById('zs-chip-h'), chipC = document.getElementById('zs-chip-c'), chipJ = document.getElementById('zs-chip-j'), resp = document.getElementById('zs-resp');\n      var bigUrl = document.getElementById('zs-big-url'), bigLoad = document.getElementById('zs-big-load'), bigPage = document.getElementById('zs-big-page'), go = document.getElementById('zs-go'), cursor = document.getElementById('zs-cursor');\n      var cap = document.getElementById('zs-caption');\n      var playBtn = document.getElementById('zs-play'), scrub = document.getElementById('zs-scrub'), replayBtn = document.getElementById('zs-replay');\n      var DUR = 24000, t = 0, playing = false, last = 0;\n      var URLTEXT = 'https://example.com';\n\n      function clamp01(x){ return x<0?0:x>1?1:x; }\n      function seg(v,a,b){ return clamp01((v-a)/(b-a)); }\n      function lerp(a,b,u){ return a+(b-a)*u; }\n      function ease(u){ return u<0.5?2*u*u:1-Math.pow(-2*u+2,2)/2; }\n      function kf(keys, fields, tt){\n        if (tt<=keys[0].t){ var r0={}; fields.forEach(function(f){r0[f]=keys[0][f];}); return r0; }\n        var L=keys[keys.length-1];\n        if (tt>=L.t){ var rn={}; fields.forEach(function(f){rn[f]=L[f];}); return rn; }\n        for (var i=0;i<keys.length-1;i++){ var a=keys[i],b=keys[i+1];\n          if (tt>=a.t && tt<=b.t){ var u=ease((tt-a.t)/(b.t-a.t)); var r={}; fields.forEach(function(f){r[f]=lerp(a[f],b[f],u);}); return r; } }\n        return {};\n      }\n\n      var camKeys = [\n        {t:0.00,cx:290,cy:175,s:1.85},{t:0.12,cx:290,cy:180,s:1.8},{t:0.20,cx:300,cy:330,s:1.5},\n        {t:0.25,cx:1000,cy:275,s:1.0},{t:0.39,cx:1000,cy:275,s:1.0},{t:0.45,cx:1700,cy:345,s:1.45},\n        {t:0.52,cx:1710,cy:175,s:1.75},{t:0.60,cx:1710,cy:175,s:1.75},{t:0.66,cx:1700,cy:345,s:1.45},\n        {t:0.72,cx:1000,cy:275,s:1.0},{t:0.85,cx:1000,cy:275,s:1.0},{t:0.91,cx:300,cy:330,s:1.5},\n        {t:0.97,cx:2 bigS=lerp(1,3,u); }\n        else if (t < 0.90) { bigO=0; bigS=3; }\n        else { var u2=ease(seg(t,0.90,0.96)); bigO=u2; bigS=lerp(0.82,1,u2); }\n        big.style.opacity=bigO; big.style.transform='scale('+bigS+')'; big.style.pointerEvents=bigO>0.5?'auto':'none';\n        var worldO = clamp01(Math.min(seg(t,0.12,0.16), 1-seg(t,0.88,0.93)));\n        world.style.opacity = worldO;\n        if (t < 0.16) {\n          bigUrl.textContent = URLTEXT.slice(0, Math.round(seg(t,0,0.06)*URLTEXT.length));\n          cursor.style.opacity = 1;\n          var cu = ease(seg(t,0.05,0.095));\n          cursor.style.left = lerp(430,792,cu) + 'px';\n          cursor.style.top = lerp(330,30,cu) + 'px';\n          var press = (t>0.097 && t<0.135);\n          go.style.transform = press ? 'scale(0.92)' : 'scale(1)';\n          go.style.background = press ? 'var(--accent)' : '';\n          go.style.color = press ? '#fff' : '';\n          go.style.borderColor = press ? 'var(--accent)' : '';\n        } else {\n          cursor.style.opacity = 0;\n          bigUrl.textContent = URLTEXT;\n        }\n        bigPage.style.opacity = seg(t,0.91,0.97);\n        bigLoad.style.opacity = 1 - seg(t,0.90,0.94);\n        if (worldO > 0.01) worldRender(seg(t,0.14,0.90));\n        var cp = t<0.055 ? '브라우저에 주소(URL)를 입력하고'\n          : t<0.14 ? '이동 버튼을 누르면 — 요청이 출발한다'\n          : t<0.90 ? worldCap(seg(t,0.14,0.90))\n          : '브라우저가 화면을 그린다';\n        if (cap.textContent !== cp) cap.textContent = cp;\n      }\n\n      function frame(ts){\n        if (!last) last = ts;\n        var dt = ts - last; last = ts;\n        if (playing){ t += dt/DUR; if (t>=1){ t=1; playing=false; playBtn.textContent='▶ 재생'; } scrub.value=Math.round(t*1000); render(); }\n        requestAnimationFrame(frame);\n      }\n      function play(){ if (t>=1) t=0; playing=true; last=0; playBtn.textContent='⏸ 일시정지'; }\n      function pause(){ playing=false; playBtn.textContent='▶ 재생'; }\n      playBtn.addEventListener('click', function -om-id=\"7e717c8b:930\">\n      <div class=\"stack-card\" data-om-id=\"7e717c8b:931\">\n        <div class=\"label\" data-om-id=\"7e717c8b:932\">01 · STRUCTURE<\u002Fdiv>\n        <div class=\"name\" data-om-id=\"7e717c8b:933\">HTML<\u002Fdiv>\n        <div class=\"role\" data-om-id=\"7e717c8b:934\">문서의 <b data-om-id=\"7e717c8b:935\">구조<\u002Fb>를 정의<br data-om-id=\"7e717c8b:936\">제목, 문단, 이미지, 폼 …<\u002Fdiv>\n        <div class=\"mini\" data-om-id=\"7e717c8b:937\">&lt;h1&gt;안녕&lt;/h1&gt;\n&lt;p&gt;반갑습니다&lt;/p&gt;<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stack-card\" data-om-id=\"7e717c8b:938\">\n        <div class=\"label\" data-om-id=\"7e717c8b:939\">02 · STYLE<\u002Fdiv>\n        <div class=\"name\" data-om-id=\"7e717c8b:940\">CSS<\u002Fdiv>\n        <div class=\"role\" data-om-id=\"7e717c8b:941\">문서의 <b data-om-id=\"7e717c8b:942\">모양<\u002Fb>을 정의<br data-om-id=\"7e717c8b:943\">색, 크기, 여백, 레이아웃 …<\u002Fdiv>\n        <div class=\"mini\" data-om-id=\"7e717c8b:944\">h1 {\n  color: #c84b16;\n  font-size: 48px;\n}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stack-card\" data-om-id=\"7e717c8b:945\">\n        <div class=\"label\" data-om-id=\"7e717c8b:946\">03 · BEHAVIOR<\u002Fdiv>\n        <div class=\"name\" data-om-id=\"7e717c8b:947\">JS<\u002Fdiv>\n        <div class=\"role\" data-om-id=\"7e717c8b:948\">문서의 <b data-om-id=\"7e717c8b:949\">동작<\u002Fb>을 정의<br data-om-id=\"7e717c8b:950\">버튼 클릭, 데이터 요청 …<\u002Fdiv>\n        <div class=\"mini\" data-om-id=\"7e717c8b:951\">btn.onclick = () =&gt; {\n  alert(\"클릭!\");\n};<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <ul class=\"bullets\" style=\"margin-top:48px;\" data-om-id=\"7e717c8b:952\">\n      <li data-om-id=\"7e717c8b:953\">브라우저는 이 셋을 받아 <span style=\"color:var(--accent);font-weight:600;\" data-om-id=\"7e717c8b:954\">렌더링<\u002Fspan> — HTML로 DOM 트리 구성, CSS 입히고, JS 실행<\u002Fli>\n      <li class=\"muted\" data-om-id=\"7e717c8b:955\">세 언어 모두 평문 텍스트 — 서버는 그저 텍스트를 보내줄 뿐<\u002Fli>\n    <\u002Ful>\n    <div class=\"footer\" data-om-id=\"7e717c8b:956\">\n      <span class=\"brand\" data-om-id=\"7e717c8b:957\">웹<\u002Fspan>\n      <span class=\"pageno\" data-om-id=\"7e717c8b:958\">05<span class=\"total\" data-om-id=\"7e717c8b:959\"> / 27<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────── 11  HTML 상세 ───────── -->\n  <section data-screen-label=\"24 HTML\" data-om-id=\"7e717c8b:960\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"22\">\n    <div class=\"eyebrow\" data-om-id=\"7e717c8b:961\"><span class=\"num\" data-om-id=\"7e717c8b:962\">02<\u002Fspan>HTML · CSS · JS<\u002Fdiv>\n    <h1 class=\"slide-title\" data-om-id=\"7e717c8b:963\">HTML <span class=\"sub\" data-om-id=\"7e717c8b:964\">— 구조<\u002Fspan><\u002Fh1>\n    <div class=\"demo-layout\">\n      <div>\n        <ul class=\"bullets\">\n          <li><code>태그<\u002Fcode>로 의미가 있는 덩어리를 표시<\u002Fli>\n          <li>태그는 <span class=\"mono\">포개져<\u002Fspan> 상자 안의 상자처럼 짜임<\u002Fli>\n          <li>이 짜임새가 브라우저 안에서 <span style=\"color:var(--accent);font-weight:600;\">DOM<\u002Fspan> — 화면을 이루는 뼈대<\u002Fli>\n          <li>속성으로 추가 정보 — <code>href<\u002Fcode>, <code>src<\u002Fcode>, <code>class<\u002Fcode> …<\u002Fli>\n          <li class=\"muted\">의미에 맞는 태그를 쓰는 것이 접근성·검색에 유리<\u002Fli>\n        <\u002Ful>\n        <div class=\"demo-hint\">코드 한 줄에 마우스를 올리면 화면 요소가 켜집니다<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"demo-right\" id=\"demo-html\">\n        <div class=\"codepanel\">\n          <div class=\"cp-bar\"><span>index.html<\u002Fspan><span>HTML — 구조<\u002Fspan><\u002Fdiv>\n          <div class=\"cp-code\"><span class=\"cl\"><span class=\"tag\">&lt;article&gt;<\u002Fspan><\u002Fspan><span class=\"cl\" data-ref=\"img\">&nbsp;&nbsp;<span class=\"tag\">&lt;img <span class=\"kw\">class<\u002Fspan>=<span class=\"str\">\"hero\"<\u002Fspan> <span class=\"kw\">src<\u002Fspan>=<span class=\"str\">\"hero.jpg\"<\u002Fspan>&gt;<\u002Fspan><\u002Fspan><span class=\"cl\" data-ref=\"title\">&nbsp;&nbsp;<span class=\"tag\">&lt;h1&gt;<\u002Fspan>웹 입문<span class=\"tag\">&lt;/h1&gt;<\u002Fspan><\u002Fspan><span class=\"cl\" data-ref=\"lead\">&nbsp;&nbsp;<span class=\"tag\">&lt;p <span class=\"kw\">class<\u002Fspan>=<span class=\"str\">\"lead\"<\u002Fspan>&gt;<\u002Fspan>브라우저가 화면을…<span class=\"tag\">&lt;/p&gt;<\u002Fspan><\u002Fspan><span class=\"cl\" data-ref=\"body\">&nbsp;&nbsp;<span class=\"tag\">&lt;p&gt;<\u002Fspan>세 가지 역할<span class=\"tag\">&lt;/p&gt;<\u002Fspan><\u002Fspan><span class=\"cl\" data-ref=\"btn\">&nbsp;&nbsp;<span class=\"tag\">&lt;button&gt;<\u002Fspan>♥ 좋아요<span class=\"tag\">&lt;/button&gt;<\u002Fspan><\u002Fspan><span class=\"cl\"><span class=\"tag\">&lt;/article&gt;<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"browser\">\n          <div class=\"bz-bar\"><span class=\"bz-dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan><span class=\"bz-url\">example.com<\u002Fspan><\u002Fdiv>\n          <div class=\"bz-body\">\n        <div class=\"bp-page\">\n          <div class=\"bp-hero\" data-el=\"img\" data-tag=\"img\">이미지<\u002Fdiv>\n          <h2 class=\"bp-title\" data-el=\"title\" data-tag=\"h1\">웹 입문<\u002Fh2>\n          <p class=\"bp-lead\" data-el=\"lead\" data-tag=\"p.lead\">브라우저가 화면을 그리는 원리를 한 장으로.<\u002Fp>\n          <p class=\"bp-body\" data-el=\"body\" data-tag=\"p\">HTML은 구조, CSS는 스타일, JS는 동작을 맡습니다.<\u002Fp>\n          <button class=\"bp-btn\" data-el=\"btn\" data-tag=\"button\">♥ 좋아요 <span class=\"bp-count\" data-el=\"count\" data-tag=\"span\">0<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer\" data-om-id=\"7e717c8b:1000\">\n      <span class=\"brand\" data-om-id=\"7e717c8b:1001\">웹<\u002Fspan>\n      <span class=\"pageno\" data-om-id=\"7e717c8b:1002\">06<span class=\"total\" data-om-id=\"7e717c8b:1003\"> / 27<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────── 12  CSS 상세 ───────── -->\n  <section data-screen-label=\"25 CSS\" data-om-id=\"7e717c8b:1004\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"23\">\n    <div class=\"eyebrow\" data-om-id=\"7e717c8b:1005\"><span class=\"num\" data-om-id=\"7e717c8b:1006\">03<\u002Fspan>HTML · CSS · JS<\u002Fdiv>\n    <h1 class=\"slide-title\" data-om-id=\"7e717c8b:1007\">CSS <span class=\"sub\" data-om-id=\"7e717c8b:1008\">— 스타일<\u002Fspan><\u002Fh1>\n    <div class=\"demo-layout\">\n      <div>\n        <ul class=\"bullets\">\n          <li><span class=\"mono\">선택자<\u002Fspan>로 대상 요소를 고르고, 속성·값을 부여<\u002Fli>\n          <li>요소·클래스·상태(<code>:hover<\u002Fcode>) 등으로 선택 가능<\u002Fli>\n          <li>여러 규칙이 겹치면 <span class=\"mono\">우선순위<\u002Fspan>로 적용 — 구체적일수록 강함<\u002Fli>\n          <li>레이아웃은 주로 <span style=\"color:var(--accent);font-weight:600;\">flex / grid<\u002Fspan>로 잡음<\u002Fli>\n          <li class=\"muted\">색·여백·타이포만 잘 잡아도 결과의 절반<\u002Fli>\n        <\u002Ful>\n        <div class=\"demo-hint\">규칙에 올리면 대상이 보이고, 토글로 스타일을 끌 수 있습니다<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"demo-right\" id=\"demo-css\">\n        <div class=\"codepanel\">\n          <div class=\"cp-bar\"><span>style.css<\u002Fspan><button class=\"cp-toggle\" data-on=\"true\" id=\"css-toggle\">스타일 ON<\u002Fbutton><\u002Fdiv>\n          <div class=\"cp-code\"><span class=\"cl\" data-ref=\"img\"><span class=\"tag\">.hero<\u002Fspan> { <span class=\"prop\">height<\u002Fspan>: <span class=\"val\">132px<\u002Fspan>; <span class=\"prop\">background<\u002Fspan>: <span class=\"val\">stripes<\u002Fspan>; }<\u002Fspan><span class=\"cl\" data-ref=\"title\"><span class=\"tag\">h1<\u002Fspan> { <span class=\"prop\">color<\u002Fspan>: <span class=\"val\">#c84b16<\u002Fspan>; <span class=\"prop\">font-size<\u002Fspan>: <span class=\"val\">34px<\u002Fspan>; }<\u002Fspan><span class=\"cl\" data-ref=\"lead\"><span class=\"tag\">.lead<\u002Fspan> { <span class=\"prop\">color<\u002Fspan>: <span class=\"val\">#8a8a8a<\u002Fspan>; }<\u002Fspan><span class=\"cl\" data-ref=\"btn\"><span class=\"tag\">button<\u002Fspan> { <span class=\"prop\">background<\u002Fspan>: <span class=\"val\">#c84b16<\u002Fspan>; <span class=\"prop\">color<\u002Fspan>: <span class=\"val\">#fff<\u002Fspan>; <span class=\"prop\">border-radius<\u002Fspan>: <span class=\"val\">8px<\u002Fspan>; }<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"browser\">\n          <div class=\"bz-bar\"><span class=\"bz-dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan><span class=\"bz-url\">example.com<\u002Fspan><\u002Fdiv>\n          <div class=\"bz-body\">\n        <div class=\"bp-page\">\n          <div class=\"bp-hero\" data-el=\"img\" data-tag=\"img\">이미지<\u002Fdiv>\n          <h2 class=\"bp-title\" data-el=\"title\" data-tag=\"h1\">웹 입문<\u002Fh2>\n          <p class=\"bp-lead\" data-el=\"lead\" data-tag=\"p.lead\">브라우저가 화면을 그리는 원리를 한 장으로.<\u002Fp>\n          <p class=\"bp-body\" data-el=\"body\" data-tag=\"p\">HTML은 구조, CSS는 스타일, JS는 동작을 맡습니다.<\u002Fp>\n          <button class=\"bp-btn\" data-el=\"btn\" data-tag=\"button\">♥ 좋아요 <span class=\"bp-count\" data-el=\"count\" data-tag=\"span\">0<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer\" data-om-id=\"7e717c8b:1040\">\n      <span class=\"brand\" data-om-id=\"7e717c8b:1041\">웹<\u002Fspan>\n      <span class=\"pageno\" data-om-id=\"7e717c8b:1042\">07<span class=\"total\" data-om-id=\"7e717c8b:1043\"> / 27<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────── 13  JS 상세 ───────── -->\n  <section data-screen-label=\"26 JS\" data-om-id=\"7e717c8b:1044\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"24\">\n    <div class=\"eyebrow\" data-om-id=\"7e717c8b:1045\"><span class=\"num\" data-om-id=\"7e717c8b:1046\">04<\u002Fspan>HTML · CSS · JS<\u002Fdiv>\n    <h1 class=\"slide-title\" data-om-id=\"7e717c8b:1047\">JS <span class=\"sub\" data-om-id=\"7e717c8b:1048\">— 동작<\u002Fspan><\u002Fh1>\n    <div class=\"demo-layout\">\n      <div>\n        <ul class=\"bullets\">\n          <li>브라우저에 내장된 <span class=\"mono\">JS 엔진<\u002Fspan>이 코드를 실행<\u002Fli>\n          <li>DOM을 읽고 바꾸면 화면이 <span style=\"color:var(--accent);font-weight:600;\">즉시<\u002Fspan> 갱신됨<\u002Fli>\n          <li><code>fetch<\u002Fcode>로 서버에 추가 요청 — 새로고침 없이 데이터 교환<\u002Fli>\n          <li>이벤트 기반 — 클릭, 입력, 타이머에 반응<\u002Fli>\n          <li class=\"muted\">최근의 웹앱은 대부분의 동작이 JS로 굴러감<\u002Fli>\n        <\u002Ful>\n        <div class=\"demo-hint\">오른쪽 ♥ 버튼을 직접 눌러보세요 — 코드가 실행됩니다<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"demo-right\" id=\"demo-js\">\n        <div class=\"codepanel\">\n          <div class=\"cp-bar\"><span>app.js<\u002Fspan><span>JS — 동작<\u002Fspan><\u002Fdiv>\n          <div class=\"cp-code\"><span class=\"cl\"><span class=\"com\">// 버튼과 카운터를 찾는다<\u002Fspan><\u002Fspan><span class=\"cl\" data-ref=\"btn\"><span class=\"kw\">const<\u002Fspan> btn = document.<span class=\"kw\">querySelector<\u002Fspan>(<span class=\"str\">\".bp-btn\"<\u002Fspan>);<\u002Fspan><span class=\"cl\"><span class=\"kw\">let<\u002Fspan> n = <span class=\"val\">0<\u002Fspan>;<\u002Fspan><span class=\"cl\" data-ref=\"btn\">btn.<span class=\"kw\">addEventListener<\u002Fspan>(<span class=\"str\">\"click\"<\u002Fspan>, () =&gt; {<\u002Fspan><span class=\"cl\" data-ref=\"count\">&nbsp;&nbsp;count.textContent = ++n;<span class=\"com\"> // 화면 갱신<\u002Fspan><\u002Fspan><span class=\"cl\">});<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"browser\">\n          <div class=\"bz-bar\"><span class=\"bz-dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan><span class=\"bz-url\">example.com<\u002Fspan><\u002Fdiv>\n          <div class=\"bz-body\">\n        <div class=\"bp-page\" id=\"bp-js-page\">\n          <div class=\"bp-hero\" data-el=\"img\" data-tag=\"img\">이미지<\u002Fdiv>\n          <h2 class=\"bp-title\" data-el=\"title\" data-tag=\"h1\">웹 입문<\u002Fh2>\n          <p class=\"bp-lead\" data-el=\"lead\" data-tag=\"p.lead\">브라우저가 화면을 그리는 원리를 한 장으로.<\u002Fp>\n          <p class=\"bp-body\" data-el=\"body\" data-tag=\"p\">HTML은 구조, CSS는 스타일, JS는 동작을 맡습니다.<\u002Fp>\n          <button class=\"bp-btn\" data-el=\"btn\" data-tag=\"button\">♥ 좋아요 <span class=\"bp-count\" data-el=\"count\" data-tag=\"span\">0<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer\" data-om-id=\"7e717c8b:1076\">\n      <span class=\"brand\" data-om-id=\"7e717c8b:1077\">웹<\u002Fspan>\n      <span class=\"pageno\" data-om-id=\"7e717c8b:1078\">08<span class=\"total\" data-om-id=\"7e717c8b:1079\"> / 27<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────── 14  핵심 정리 ───────── -->\n  <section data-screen-label=\"03 PART 01\" class=\"divider\" data-om-id=\"7e717c8b:19\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"1\">\n    <div class=\"chap\" data-om-id=\"7e717c8b:20\">PART 02<\u002Fdiv>\n    <h1 data-om-id=\"7e717c8b:21\">웹의<br data-om-id=\"7e717c8b:22\">기본 구조<\u002Fh1>\n    <p class=\"desc\" data-om-id=\"7e717c8b:23\">\n      웹은 결국 클라이언트가 서버에 무언가를 요청하고, 서버가 응답하는 단순한 관계.<br data-om-id=\"7e717c8b:24\">\n      그 관계 위에 URL, HTTP, 프로토콜이 얹혀있을 뿐.\n    <\u002Fp>\n    <div class=\"footer\" data-om-id=\"7e717c8b:25\">\n      <span class=\"brand\" data-om-id=\"7e717c8b:26\">웹<\u002Fspan>\n      <span class=\"pageno\" data-om-id=\"7e717c8b:27\">09<span class=\"total\" data-om-id=\"7e717c8b:28\"> / 27<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────── 03  클라이언트 - 서버 ───────── -->\n  <section data-screen-label=\"04 클라이언트-서버\" data-om-id=\"7e717c8b:29\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"2\">\n    <div class=\"eyebrow\" data-om-id=\"7e717c8b:30\"><span class=\"num\" data-om-id=\"7e717c8b:31\">05<\u002Fspan>웹의 기본 구조<\u002Fdiv>\n    <h1 class=\"slide-title\" data-om-id=\"7e717c8b:32\">클라이언트 <span class=\"sub\" data-om-id=\"7e717c8b:33\">·<\u002Fspan> 서버<\u002Fh1>\n    <div class=\"twocol\" data-om-id=\"7e717c8b:34\">\n      <div data-om-id=\"7e717c8b:35\">\n        <ul class=\"bullets\" data-om-id=\"7e717c8b:36\">\n          <li data-om-id=\"7e717c8b:37\">요청하는 쪽이 <span style=\"color:var(--accent);font-weight:600;\" data-om-id=\"7e717c8b:38\">클라이언트<\u002Fspan> — 브라우저, 앱, curl …<\u002Fli>\n          <li data-om-id=\"7e717c8b:39\">받아서 응답하는 쪽이 <span style=\"color:var(--accent);font-weight:600;\" data-om-id=\"7e717c8b:40\">서버<\u002Fspan> — 항상 켜져있는 컴퓨터<\u002Fli>\n          <li data-om-id=\"7e717c8b:41\">둘 사이는 <code data-om-id=\"7e717c8b:42\">HTTP<\u002Fcode> 라는 약속된 형식으로 대화<\u002Fli>\n          <li data-om-id=\"7e717c8b:43\">서버는 사람이 보는 문서(HTML)도, 기계가 보는 데이터(JSON)도 줄 수 있음<\u002Fli>\n          <li class=\"muted\" data-om-id=\"7e717c8b:44\">\"웹서비스를 만든다\" = 서버를 띄우고 응답 규칙을 정하는 것<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"right\" data-om-id=\"7e717c8b:45\">\n        <div style=\"width:100%;aspect-ratio:1/1;max-height:580px;background:var(--code-bg);border:1px solid var(--rule);border-radius:8px;padding:30px;\" data-om-id=\"7e717c8b:46\">\n          <svg viewBox=\"0 0 500 500\" style=\"width:100%;height:100%;\" data-om-id=\"7e717c8b:47\">\n            <defs data-om-id=\"7e717c8b:48\">\n              <marker id=\"arrCS\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"8\" markerHeight=\"8\" orient=\"auto\" data-om-id=\"7e717c8b:49\">\n                <path d=\"M0,0 L10,5 L0,10 z\" fill=\"#c84b16\" data-om-id=\"7e717c8b:50\"><\u002Fpath>\n              <\u002Fmarker>\n              <marker id=\"arrSC\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"8\" markerHeight=\"8\" orient=\"auto\" data-om-id=\"7e717c8b:51\">\n                <path d=\"M n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer\" data-om-id=\"7e717c8b:78\">\n      <span class=\"brand\" data-om-id=\"7e717c8b:79\">웹<\u002Fspan>\n      <span class=\"pageno\" data-om-id=\"7e717c8b:80\">10<span class=\"total\" data-om-id=\"7e717c8b:81\"> / 27<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────── 04  Claude Code 동작 애니메이션 ───────── -->\n  <section data-screen-label=\"08 HTTP\" data-om-id=\"7e717c8b:326\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"6\">\n    <div class=\"eyebrow\" data-om-id=\"7e717c8b:327\"><span class=\"num\" data-om-id=\"7e717c8b:328\">06<\u002Fspan>웹의 기본 구조<\u002Fdiv>\n    <h1 class=\"slide-title\" data-om-id=\"7e717c8b:329\">HTTP <span class=\"sub\" data-om-id=\"7e717c8b:330\">— 요청과 응답의 형식<\u002Fspan><\u002Fh1>\n    <div class=\"http-grid\" data-om-id=\"7e717c8b:331\">\n      <div class=\"http-card req\" data-om-id=\"7e717c8b:332\">\n        <header data-om-id=\"7e717c8b:333\">REQUEST<\u002Fheader>\n<pre data-om-id=\"7e717c8b:334\"><span class=\"kw\" data-om-id=\"7e717c8b:335\">GET<\u002Fspan> /study/web <span class=\"kw\" data-om-id=\"7e717c8b:336\">HTTP/1.1<\u002Fspan>\n<span class=\"hd\" data-om-id=\"7e717c8b:337\">Host:<\u002Fspan> example.com\n<span class=\"hd\" data-om-id=\"7e717c8b:338\">User-Agent:<\u002Fspan> Mozilla/5.0 …\n<span class=\"hd\" data-om-id=\"7e717c8b:339\">Accept:<\u002Fspan> text/html\n<span class=\"hd\" data-om-id=\"7e717c8b:340\">Cookie:<\u002Fspan> session=abc123<\u002Fpre>\n      <\u002Fdiv>\n      <div class=\"http-card res\" data-om-id=\"7e717c8b:341\">\n        <header data-om-id=\"7e717c8b:342\">RESPONSE<\u002Fheader>\n<pre data-om-id=\"7e717c8b:343\"><span class=\"kw\" data-om-id=\"7e717c8b:344\">HTTP/1.1<\u002Fspan> <span class=\"kw\" data-om-id=\"7e717c8b:345\">200 OK<\u002Fspan>\n<span class=\"hd\" data-om-id=\"7e717c8b:346\">Content-Type:<\u002Fspan> text/html\n<span class=\"hd\" data-om-id=\"7e717c8b:347\">Content-Length:<\u002Fspan> 1842\n\n&lt;!doctype html&gt;\n&lt;html&gt; … &lt;/html&gt;<\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <ul class=\"bullets\" style=\"margin-top:40px;\" data-om-id=\"7e717c8b:348\">\n      <li data-om-id=\"7e717c8b:349\">요청 = <code data-om-id=\"7e717c8b:350\">메소드<\u002Fcode> + <code data-om-id=\"7e717c8b:351\">경로<\u002Fcode> + <code data-om-id=\"7e717c8b:352\">헤더<\u002Fcode> + (본문)<\u002Fli>\n      <li data-om-id=\"7e717c8b:353\">응답 = <code data-om-id=\"7e717c8b:354\">상태 코드<\u002Fcode> + <code data-om-id=\"7e717c8b:355\">헤더<\u002Fcode> + 본문 — 본문이 HTML이면 화면이, JSON이면 데이터가 옴<\u002Fli>\n      <li class=\"muted\" data-om-id=\"7e717c8b:356\">메소드: GET (조회) · POST (생성) · PUT/PATCH (수정) · DELETE (삭제)<\u002Fli>\n    <\u002Ful>\n    <div class=\"footer\" data-om-id=\"7e717c8b:357\">\n      <span class=\"brand\" data-om-id=\"7e717c8b:358\">웹<\u002Fspan>\n      <span class=\"pageno\" data-om-id=\"7e717c8b:359\">11<span class=\"total\" data-om-id=\"7e717c8b:360\"> / 27<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection><section data-screen-label=\"06 Claude Code 동작\" id=\"cc-anim-slide\" data-om-id=\"7e717c8b:82\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"4\" data-deck-active=\"\">\n    <style>\n      #cc-anim-slide .wire { stroke-dasharray: 7 6; }\n      #cc-anim-slide .wire.hot {\n        stroke: #c84b16 !important;\n        stroke-width: 3.5;\n        animation: ccDashFwd 0.55s linear infinite;\n      }\n      #cc-anim-slide .wire.hot.rev { animation: ccDashRev 0.55s linear infinite; }\n      @keyframes ccDashFwd { to { stroke-dashoffset: -13; } }\n      @keyframes ccDashRev { to { stroke-dashoffset: 13; } }\n      #cc-anim-slide .node.active .node-bg { fill: #fff7f2; stroke: #c84b16; stroke-width: 2.5; }\n      .cc-data-fo {\n        font-family: var(--font-mono);\n        height: 100%;\n        box-sizing: border-box;\n        padding: 12px 16px;\n 내 PC → 서버 (요청)\", cls: \"req\",\n        code:\n'<span class=\"c\">POST api.anthropic.com/v1/messages<\u002Fspan>\\n' +\n'{\\n' +\n'  \"model\": <span class=\"s\">\"claude-sonnet-4\"<\u002Fspan>,\\n' +\n'  \"system\": <span class=\"s\">\"You are Claude Code\"<\u002Fspan>,\\n' +\n'  \"tools\": [<span class=\"s\">\"read_file\"<\u002Fspan>, <span class=\"s\">\"str_replace\"<\u002Fspan>],\\n' +\n'  \"messages\": [\\n' +\n'    { \"role\": <span class=\"s\">\"user\"<\u002Fspan>,\\n' +\n'      \"content\": <span class=\"s\">\"auth.js에 로그인 함수 추가해줘\"<\u002Fspan> }]\\n' +\n'}\\n' +\n'<span class=\"c\">// 파일 내용은 아직 안 보냄 — 무엇을\\n' +\n'//  읽을지는 서버의 모델이 정함<\u002Fspan>'\n      },\n      RES_READ: {\n        dir: \"▼ 서버 → 내 PC (읽기 지시)\", cls: \"res\",\n        code:\n'<span class=\"c\">200 OK<\u002Fspan>\\n' +\n'{\\n' +\n'  \"role\": <span class=\"s\">\"assistant\"<\u002Fspan>,\\n' +\n'  \"stop_reason\": <span class=\"s\">\"tool_use\"<\u002Fspan>,\\n' +\n'  \"content\": [\\n' +\n'    { \"type\": <span class=\"s\">\"text\"<\u002Fspan>,\\n' +\n'      \"text\": <span class=\"s\">\"먼저 auth.js를 확인할게요\"<\u002Fspan> },\\n' +\n'    { \"type\": <span class=\"s\">\"tool_use\"<\u002Fspan>, \"name\": <span class=\"s\">\"read_file\"<\u002Fspan>,\\n' +\n'      \"input\": { \"path\": <span class=\"s\">\"auth.js\"<\u002Fspan> } }]\\n' +\n'}'\n      },\n      REQ_READRESULT: {\n        dir: \"▲ 내 PC → 서버 (파일 내용)\", cls: \"req\",\n        code:\n'<span class=\"c\">POST …/v1/messages  (대화에 이어붙임)<\u002Fspan>\\n' +\n'{\\n' +\n'  \"messages\": [ …,\\n' +\n'    { \"role\": <span class=\"s\">\"user\"<\u002Fspan>, \"content\": [{\\n' +\n'      \"type\": <span class=\"s\">\"tool_result\"<\u002Fspan>,\\n' +\n'      \"tool_use_id\": <span class=\"s\">\"toolu_01…\"<\u002Fspan>,\\n' +\n'      \"content\": <span class=\"s\">\"auth.js: export function\\n' +\n'         logout(){…}  // 로그인 함수 없음\"<\u002Fspan>\\n' +\n'    }] }]\\n' +\n'}'\n      },\n      RES_EDIT: {\n        dir: \"▼ 서버 → 내 PC (수정 지시)\", cls: \"res\",\n        code:\n'<span class=\"c\">200 OK<\u002Fspan>\\n' +\n'{\\n' +\n'  \"role\": <span class=\"s\">\"assistant\"<\u002Fspan>,\\n' +\n'  \"stop_reason\": <span class=\"s\">\"tool_use\"<\u002Fspan>,\\n' +\n'  \"content\": [\\n' +\n'    { \"type\": <span class=\"s\">\"text\"<\u002Fspan>,\\n' +\n'      \"text\": <span class=\"s\">\"로그인 함수를 추가할게요\"<\u002Fspan> },\\n' +\n'    { \"type\": <span class=\"s\">\"tool_use\"<\u002Fspan>, \"name\": <span class=\"s\">\"str_replace\"<\u002Fspan>,\\n' +\n'      \"input\": { \"file\": <span class=\"s\">\"auth.js\"<\u002Fspan>,\\n' +\n'        \"new\": <span class=\"s\">\"export function login(id,pw){…}\"<\u002Fspan> }}]\\n' +\n'}'\n      },\n      REQ_EDITRESULT: {\n        dir: \"▲ 내 PC → 서버 (수정 결과)\", cls: \"req\",\n        code:\n'<span class=\"c\">POST …/v1/messages<\u002Fspan>\\n' +\n'{\\n' +\n'  \"messages\": [ …,\\n' +\n'    { \"role\": <span class=\"s\">\"user\"<\u002Fspan>, \"content\": [{\\n' +\n'      \"type\": <span class=\"s\">\"tool_result\"<\u002Fspan>,\\n' +\n'      \"tool_use_id\": <span class=\"s\">\"toolu_02…\"<\u002Fspan>,\\n' +\n'      \"content\": <span class=\"s\">\"auth.js 수정 완료 (3줄 추가)\"<\u002Fspan>\\n' +\n'    }] }]\\n' +\n'}'\n      },\n      RESF: {\n        dir: \"▼ 서버 → 내 PC (완료)\", cls: \"res\",\n        code:\n'<span class=\"c\">200 OK<\u002Fspan>\\n' +\n'{\\n' +\n'  \"role\": <span class=\"s\">\"assistant\"<\u002Fspan>,\\n' +\n'  \"stop_reason\": <span class=\"s\">\"end_turn\"<\u002Fspan>,\\n' +\n'  \"content\": [\\n' +\n'    { \"type\": <span class=\"s\">\"text\"<\u002Fspan>,\\n' +\n'      \"text\": <span class=\"s\">\"auth.js에 로그인 함수를\\n' +\n'              추가했어요.\"<\u002Fspan> }]\\n' +\n'}'\n      }\n    };\n\n    var STEPS = [\n      { nodes: [\"cc-node-1\"], wires: [\"cc-w-1to2\"], data: \"REQ_INIT\",\n        title: \"사용자가 터미널에 요청 입력\",\n        desc: \"터미널에 <code>auth.js에 로그인 함수 추가해줘<\u002Fcode> 입력. Claude Code 는 이 말을 받아 서버에 보낼 요청으로 만듦.\" },\n      { nodes: [\"cc-node-data\", \"cc-node-server\"], wires: [\"cc-w-cc-data\", \"cc-w-req\"], data: \"REQ_INIT\",\n        title: \"요청을 Anthropic 서버로 전송\",\n        desc: \"Claude Code 는 어떤 파일을 봐야 할지 <b>스스로 정하지 않음<\u002Fb>. 사용자 요청과 '쓸 수 있는 도구 목록'만 담아 서버로 보냄 (파일 내용은 아직 없음).\" },\n      { nodes: [\"cc-node-server\"], wires: [], data: \"RES_READ\",\n        title: \"모델: \\\"먼저 auth.js를 읽어야겠다\\\"\",\n        desc: \"어떤 파일을 읽을지 <b>판단하는 건 서버의 Claude 모델<\u002Fb>. 모델이 \\\"read_file 도구로 auth.js를 읽어와\\\" 라는 지시(tool_use)를 응답으로 돌려줌.\" },\n      { nodes: [\"cc-node-2\", \"cc-node-3\"], wires: [\"cc-w-res\", \"cc-w-cc-data\", \"cc-w-3to2\"], data: \"RES_READ\",\n        title: \"지시를 받고 Claude Code 가 auth.js 를 읽음\",\n        desc: \"응답의 지시대로 Claude Code 가 내 컴퓨터에서 실제로 <code>auth.js<\u002Fcode> 를 읽음. 파일 접근은 항상 내 컴퓨터 안에서만 일어남.\" },\n      { nodes: [\"cc-node-data\", \"cc-node-server\"], wires: [\"cc-w-cc-data\", \"cc-w-req\"], data: \"REQ_READRESULT\",\n        title: \"읽은 파일 내용을 서버로 전송\",\n        desc: \"읽어온 auth.js 내용을 <code>tool_result<\u002Fcode> 로 서버에 보냄. 데이터 박스 내용이 '파일 내용'으로 바뀜 — 모델이 이제 코드를 보고 판단할 수 있음.\" },\n      { nodes: [\"cc-node-server\"], wires: [], data: \"RES_EDIT\",\n        title: \"모델: \\\"이렇게 고치면 되겠다\\\"\",\n        desc: \"모델이 코드를 읽고 수정안을 결정 → \\\"str_replace 도구로 auth.js 를 이렇게 바꿔\\\" 라는 지시를 돌려줌. 위험한 변경이면 이 시점에 사용자 승인을 물어봄.\" },\n      { nodes: [\"cc-node-2\", \"cc-node-3\"], wires: [\"cc-w-res\", \"cc-w-cc-data\", \"cc-w-2to3\"], data: \"RES_EDIT\",\n        title: \"Claude Code 가 실제로 파일을 수정\",\n        desc: \"지시대로 내 컴퓨터에서 Claude Code 가 <code>auth.js<\u002Fcode> 를 고침. 실제로 파일을 바꾸는 일도 항상 내 컴퓨터 안에서.\" },\n      { nodes: [\"cc-node-data\", \"cc-node-server\"], wires: [\"cc-w-cc-data\", \"cc-w-req\"], data: \"REQ_EDITRESULT\",\n        title: \"수정 결과를 다시 서버로 전송\",\n        desc: \"\\\"시킨 대로 고쳤다\\\" 를 <code>tool_result<\u002Fcode> 로 보냄. 이렇게 (전송 → 지시 → 실행 → 전송)을 반복하는 게 <span style=\\\"color:var(--accent);font-weight:600;\\\">에이전트 루프<\u002Fspan>.\" },\n      { nodes: [\"cc-node-server\"], wires: [], data: \"RESF\",\n        title: \"모델: 더 할 일이 없다 → 완료\",\n        desc: \"모델이 결과를 확인하고 할 일이 끝났다고 판단 → 도구 없이 설명만 담은 응답(<code>end_turn<\u002Fcode>)을 돌려줌.\" },\n      { nodes: [\"cc-node-server\", \"cc-node-data\", \"cc-node-2\", \"cc-node-1\"], wires: [\"cc-w-res\", \"cc-w-cc-data\", \"cc-w-2to1\"], data: \"RESF\",\n        title: \"최종 결과를 사용자에게 보여줌\",\n        desc: \"서버의 마지막 응답이 데이터 → Claude Code 를 거쳐 터미널까지 전달됨. \\\"auth.js에 로그인 함수를 추가했어요\\\" 가 표시되고, 사용자는 바뀐 파일을 바로 확인할 수 있음.\" }\n    ];\n\n    var TOTAL = STEPS.length;\n    (function(){ var e = document.getElementById(\"cc-step-num\"); if (e && e.nextElementSibling) e.nextElementSibling.textContent = \" / \" + (TOTAL < 10 ? \"0\" : \"\") + TOTAL; })();\n    // 서버(모델)의 단계별 상태 문구\n    var SRV = [\n      \"\",\n      \"요청 수신 중…\",\n      \"판단: auth.js를 먼저 읽자 → read_file 지시\",\n      \"도구 실행 결과를 기다리는 중…\",\n      \"파일 내용 수신 — 코드 검토 중\",\n      \"판단: 이렇게 고치자 → str_replace 지시\",\n      \"도구 실행 결과를 기다리는 중…\",\n      \"수정 결과 수신 — 확인 중\",\n      \"판단: 더 할 일 없음 → 완료(end_turn)\",\n      \"최종 응답을 사용자에게 전달\"\n    ];\n    var cur = 0;\n    var playTimer = null;\n    var svg = document.getElementById(\"cc-path-svg\");\n    var dataBox = document.getElementById(\"cc-data-box\");\n    var dataDir = document.getElementById(\"cc-data-dir\");\n    var dataCode = document.getElementById(\"cc-data-code\");\n\n    function clearAll() {\n      var nodes = svg.querySelectorAll(\".node\");\n      for (var i = 0; i < nodes.length; i++) nodes[i].classList.remove(\"active\");\n      var wires = svg.querySelectorAll(\".wire\");\n      for (var j = 0; j < wires.length; j++) wires[j].classList.remove(\"hot\", \"rev\");\n    }\n\n    function applyStep(i) {\n      var s = STEPS[i];\n      clearAll();\n      for (var n = 0; n < s.nodes.length; n++) {\n        var node = svg.getElementById(s.nodes[n]);\n        if (node) node.classList.add(\"active\");\n      }\n      // 서버 상태 문구 갱신\n      var serverActive = s.nodes.indexOf(\"cc-node-server\") >= 0;\n      var srvEl = document.getElementById(\"cc-srv-status\");\n      var srvBg = document.getElementById(\"cc-srv-statusbg\");\n      srvEl.textContent = SRV[i] || \"— 대기 중 —\";\n      srvEl.setAttribute(\"fill\", serverActive ? \"#c84b16\" : \"#b3aea6\");\n      srvBg.setAttribute(\"fill\", serverActive ? \"#fff7f2\" : \"#faf8f5\");\n      srvBg.setAttribute(\"stroke\", serverActive ? \"#f0d9cc\" : \"#eee\");\n      var isReq = s.data.indexOf(\"REQ\") === 0;\n      for (var k = 0; k < s.wires.length; k++) {\n        var w = svg.getElementById(s.wires[k]);\n        if (w) {\n          w.classList.add(\"hot\");\n          // cc-data 선은 경로가 data→cc 방향. 요청 단계(cc→data)면 역방향 흐름\n          if (s.wires[k] === \"cc-w-cc-data\" && isReq) w.classList.add(\"rev\");\n        }\n      }\n      // 1·3·6·9 단계(0-indexed 0·2·5·8)는 아직 전송되는 데이터가 없음 → 박스 비움\n      var EMPTY_STEPS = [0, 2, 5, 8];\n      var d = DATA[s.data];\n      if (EMPTY_STEPS.indexOf(i) >= 0) {\n        dataBox.className = \"cc-data-fo\";\n        dataDir.textContent = \"— 전송 중인 데이터 없음 —\";\n        dataDir.style.color = \"#b3aea6\";\n        dataCode.innerHTML = \"\";\n      } else {\n        dataBox.className = \"cc-data-fo \" + d.cls;\n        dataDir.textContent = d.dir;\n        dataDir.style.color = \"\";\n        dataCode.innerHTML = d.code;\n      }\n\n      document.getElementById(\"cc-step-num\").textContent = (i + 1 < 10 ? \"0\" : \"\") + (i + 1);\n      document.getElementById(\"cc-step-title\").textContent = s.title;\n      document.getElementById(\"cc-step-desc\").innerHTML = s.desc;\n    }\n\n    function next() { cur = (cur + 1) % TOTAL; applyStep(cur); }\n    function prev() { cur = (cur - 1 + TOTAL) % TOTAL; applyStep(cur); }\n\n    function stop() {\n      if (playTimer) { clearInterval(playTimer); playTimer = null; }\n      document.getElementById(\"cc-btn-play\").textContent = \"▶ PLAY\";\n    }\n    function play() {\n      if (playTimer) { stop(); return; }\n      document.getElementById(\"cc-btn-play\").textContent = \"■ PAUSE\";\n      playTimer = setInterval(function () {\n        if (cur >= TOTAL - 1) { stop(); return; }\n        next();\n      }, 2000);\n    }\n\n    document.getElementById(\"cc-btn-next\").addEventListener(\"click\", function () { stop(); next(); });\n    document.getElementById(\"cc-btn-prev\").addEventListener(\"click\", function () { stop(); prev(); });\n    document.getElementById(\"cc-btn-play\").addEventListener(\"click\", play);\n\n    applyStep(0);\n  })();\n  <\u002Fscript>\n\n  <!-- ───────── 05  Claude 웹 채팅 동작 애니메이션 ───────── -->\n  \n\n  <script>\n  (function () {\n    var DATA = {\n      REQ: {\n        dir: \"▲ 브라우저 → 클라우드 (요청)\", cls: \"req\",\n        code:\n'<span class=\"c\">POST api.anthropic.com/v1/messages<\u002Fspan>\\n' +\n'{\\n' +\n'  \"model\": <span class=\"s\">\"claude-sonnet-4\"<\u002Fspan>,\\n' +\n'  \"messages\": [\\n' +\n'    { \"role\": <span class=\"s\">\"user\"<\u002Fspan>,\\n' +\n'      \"content\": <span class=\"s\">\"할 일 목록 앱 만들어줘\"<\u002Fspan> }],\\n' +\n'  \"tools\": [ <span class=\"s\">\"code_execution\"<\u002Fspan>,\\n' +\n'             <span class=\"s\">\"artifacts\"<\u002Fspan> ]\\n' +\n'}\\n' +\n'<span class=\"c\">// 브라우저가 보내는 건 이 한 번뿐<\u002Fspan>'\n      },\n      RES: {\n        dir: \"▼ 클라우드 → 브라우저 (응답)\", cls: \"res\",\n        code:\n'<span class=\"c\">200 OK<\u002Fspan>\\n' +\n'{\\n' +\n'  \"role\": <span class=\"s\">\"assistant\"<\u002Fspan>,\\n' +\n'  \"stop_reason\": <span class=\"s\">\"end_turn\"<\u002Fspan>,\\n' +\n'  \"content\": [\\n' +\n'    { \"type\": <span class=\"s\">\"text\"<\u002Fspan>,\\n' +\n'      \"text\": <span class=\"s\">\"할 일 목록 앱을 만들었어요\"<\u002Fspan> },\\n' +\n'    { \"type\": <span class=\"s\">\"artifact\"<\u002Fspan>, \"kind\": <span class=\"s\">\"html\"<\u002Fspan>,\\n' +\n'      \"source\": <span class=\"s\">\"&lt;html&gt;…todo app…&lt;/html&gt;\"<\u002Fspan> }]\\n' +\n'}'\n      }\n    };\n\n    // 모델(에이전트) 단계별 상태 문구\n    var MODEL = [\n      \"\",\n      \"메시지 수신 중…\",\n      \"판단: 코드로 앱을 만들자\",\n      \"도구 호출 → 코드 작성 (artifacts)\",\n      \"도구 실행 결과를 기다리는 중…\",\n      \"결과 확인 → 더 다듬을지 판단\",\n      \"판단: 완성 → end_turn\",\n      \"완성된 앱을 응답으로 전송\",\n      \"\"\n    ];\n\n    // 앱이 채워지기 시작하는 단계 (0-indexed): 5단계(도구 실행)부터\n    var APP_FILL_FROM = 4;\n    // 인터넷을 건너는 데이터가 없는 단계 (클라우드 내부 처리 or 입력 직후)\n    var EMPTY_STEPS = [0, 2, 3, 4, 5, 6];\n\n    var STEPS = [\n      { nodes: [\"cw-node-browser\"], wires: [], data: \"REQ\",\n        title: \"사용자가 채팅창에 요청 입력\",\n        desc: \"브라우저의 claude.ai 채팅창에 <code>할 일 목록 앱 만들어줘<\u002Fcode> 입력. 브라우저는 이 메시지를 클라우드로 보낼 준비를 함.\" },\n      { nodes: [\"cw-node-data\", \"cw-node-model\"], wires: [\"cw-w-b2d\", \"cw-w-req\"], data: \"REQ\",\n        title: \"메시지를 클라우드로 전송\",\n        desc: \"브라우저가 보내는 건 <b>짧은 메시지 한 번<\u002Fb>. 무거운 일은 전부 클라우드가 함 — 브라우저는 얇은 클라이언트일 뿐.\" },\n      { nodes: [\"cw-node-model\"], wires: [], data: \"REQ\",\n        title: \"[클라우드] 모델이 무엇을 할지 판단\",\n        desc: \"클라우드의 Claude 모델이 요청을 읽고 결정함 — \\\"HTML·JS로 간단한 할 일 앱을 만들면 되겠다\\\". 여기서부터는 인터넷을 건너지 않고 클라우드 안에서 진행.\" },\n      { nodes: [\"cw-node-model\", \"cw-node-tools\"], wires: [\"cw-w-m2t\"], data: \"REQ\",\n        title: \"[클라우드] 모델이 도구를 호출 — 코드 작성\",\n        desc: \"모델이 <code>artifacts<\u002Fcode> 도구로 앱 코드를 작성. Claude Code 와 달리 도구가 <b>클라우드 서버 안에서<\u002Fb> 실행됨.\" },\n      { nodes: [\"cw-node-tools\", \"cw-node-app\"], wires: [\"cw-w-t2m\", \"cw-w-t2app\"], data: \"REQ\",\n        title: \"[클라우드] 도구가 코드를 실행·검증\",\n        desc: \"작성한 코드를 클라우드에서 실행해 동작을 확인하고, 미리보기 앱을 빌드함. 결과는 다시 모델에게 돌아감.\" },\n      { nodes: [\"cw-node-model\"], wires: [\"cw-w-t2m\"], data: \"REQ\",\n        title: \"[클라우드] 모델이 결과 확인 — 필요하면 반복\",\n        desc: \"모델이 실행 결과를 보고 더 다듬을지 판단. 호출 → 실행 → 확인의 <span style=\\\"color:var(--accent);font-weight:600;\\\">에이전트 루프<\u002Fspan> 가 <b>전부 클라우드 안에서<\u002Fb> 돈다 (인터넷을 건너지 않음).\" },\n      { nodes: [\"cw-node-model\"], wires: [], data: \"REQ\",\n        title: \"[클라우드] 모델: 완성 → 마무리\",\n        desc: \"할 일이 끝났다고 판단 → 설명 텍스트와 완성된 앱(아티팩트)을 하나의 응답으로 묶음 (<code>end_turn<\u002Fcode>).\" },\n      { nodes: [\"cw-node-model\", \"cw-node-data\"], wires: [\"cw-w-res\"], data: \"RES\",\n        title: \"완성된 앱을 브라우저로 전송\",\n        desc: \"클라우드가 <b>완성된 결과를 한 번에<\u002Fb> 응답으로 보냄 — 설명 텍스트 + 앱 HTML(아티팩트). 데이터가 인터넷을 건너는 건 이때가 두 번째이자 마지막.\" },\n      { nodes: [\"cw-node-browser\"], wires: [\"cw-w-d2b\"], data: \"RES\",\n        title: \"브라우저가 앱을 화면에 띄움\",\n        desc: \"브라우저는 받은 아티팩트를 렌더링해 보여줄 뿐. 사용자는 그 자리에서 동작하는 할 일 목록 앱을 바로 쓸 수 있음.\" }\n    ];\n\n    var TOTAL = STEPS.length;\n    (function(){ var e = document.getElementById(\"cw-step-num\"); if (e && e.nextElementSibling) e.nextElementSibling.textContent = \" / \" + (TOTAL < 10 ? \"0\" : \"\") + TOTAL; })();\n    var cur = 0;\n    var playTimer = null;\n    var svg = document.getElementById(\"cw-path-svg\");\n    var dataBox = document.getElementById(\"cw-data-box\");\n    var dataDir = document.getElementById(\"cw-data-dir\");\n    var dataCode = document.getElementById(\"cw-data-code\");\n    var appFilled = document.getElementById(\"cw-app-filled\");\n    var appEmpty = document.getElementById(\"cw-app-empty\");\n\n    function clearAll() {\n      var nodes = svg.querySelectorAll(\".node\");\n      for (var i = 0; i < nodes.length; i++) nodes[i].classList.remove(\"active\");\n      var wires = svg.querySelectorAll(\".wire\");\n      for (var j = 0; j < wires.length; j++) wires[j].classList.remove(\"hot\");\n    }\n\n    function applyStep(i) {\n      var s = STEPS[i];\n      clearAll();\n      for (var n = 0; n < s.nodes.length; n++) {\n        var node = svg.getElementById(s.nodes[n]);\n        if (node) node.classList.add(\"active\");\n      }\n      for (var k = 0; k < s.wires.length; k++) {\n        var w = svg.getElementById(s.wires[k]);\n        if (w) w.classList.add(\"hot\");\n      }\n\n      // 데이터 박스\n      var d = DATA[s.data];\n      if (EMPTY_STEPS.indexOf(i) >= 0) {\n        dataBox.className = \"cw-data-fo\";\n        dataDir.textContent = \"— 인터넷을 건너는 데이터 없음 (클라우드 내부) —\";\n        dataDir.style.color = \"#b3aea6\";\n        dataCode.innerHTML = \"\";\n      } else {\n        dataBox.className = \"cw-data-fo \" + d.cls;\n        dataDir.textContent = d.dir;\n        dataDir.style.color = \"\";\n        dataCode.innerHTML = d.code;\n      }\n\n      // 모델 상태\n      var modelActive = s.nodes.indexOf(\"cw-node-model\") >= 0;\n      var mEl = document.getElementById(\"cw-model-status\");\n      var mBg = document.getElementById(\"cw-model-statusbg\");\n      mEl.textContent = MODEL[i] || \"— 대기 중 —\";\n      mEl.setAttribute(\"fill\", modelActive ? \"#c84b16\" : \"#b3aea6\");\n      mBg.setAttribute(\"fill\", modelActive ? \"#fff7f2\" : \"#faf8f5\");\n      mBg.setAttribute(\"stroke\", modelActive ? \"#f0d9cc\" : \"#eee\");\n\n      // 앱 채움\n      if (i >= APP_FILL_FROM) {\n        appFilled.style.opacity = \"1\";\n        appEmpty.style.opacity = \"0\";\n      } else {\n        appFilled.style.opacity = \"0\";\n        appEmpty.style.opacity = \"1\";\n      }\n\n      // 브라우저 응답 말풍선은 마지막 단계(앱이 도착해 화면에 뜨는 시점)에만\n      var reply = document.getElementById(\"cw-browser-reply\");\n      reply.style.opacity = (i >= TOTAL - 1) ? \"1\" : \"0\";\n\n      document.getElementById(\"cw-step-num\").textContent = (i + 1 < 10 ? \"0\" : \"\") + (i + 1);\n      document.getElementById(\"cw-step-title\").textContent = s.title;\n      document.getElementById(\"cw-step-desc\").innerHTML = s.desc;\n    }\n\n    function next() { cur = (cur + 1) % TOTAL; applyStep(cur); }\n    function prev() { cur = (cur - 1 + TOTAL) % TOTAL; applyStep(cur); }\n\n    function stop() {\n      if (playTimer) { clearInterval(playTimer); playTimer = null; }\n      document.getElementById(\"cw-btn-play\").textContent = \"▶ PLAY\";\n    }\n    function play() {\n      if (playTimer) { stop(); return; }\n      document.getElementById(\"cw-btn-play\").textContent = \"■ PAUSE\";\n      playTimer = setInterval(function () {\n        if (cur >= TOTAL - 1) { stop(); return; }\n        next();\n      }, 2000);\n    }\n\n    document.getElementById(\"cw-btn-next\").addEventListener(\"click\", function () { stop(); next(); });\n    document.getElementById(\"cw-btn-prev\").addEventListener(\"click\", function () { stop(); prev(); });\n    document.getElementById(\"cw-btn-play\").addEventListener(\"click\", play);\n\n    applyStep(0);\n  })();\n  <\u002Fscript>\n\n  <!-- ───────── 04  URL ───────── -->\n  \n\n  <!-- ───────── 05  HTTP ───────── -->\n  \n\n  <!-- ───────── 06  PART 02 divider (요청 경로) ───────── -->\n    <!-- ───────── PART 03 divider (주소 체계) ───────── -->\n  <section data-screen-label=\"PART 03\" class=\"divider\">\n    <div class=\"chap\">PART 03<\u002Fdiv>\n    <h1>주소<br>체계<\u002Fh1>\n    <p class=\"desc\">\n      요청을 보내려면 먼저 \"어디로\" 보낼지를 정해야 한다.<br>\n      IP·포트로 목적지를 정하고, DNS로 이름을 주소로 바꾸고, URL 한 줄에 담는다.\n    <\u002Fp>\n    <div class=\"footer\"><span class=\"brand\">웹<\u002Fspan><span class=\"pageno\">14<span class=\"total\"> / 27<\u002Fspan><\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────── 주소체계 · IP ───────── -->\n  <section data-screen-label=\"IP 주소\">\n    <div class=\"eyebrow\"><span class=\"num\">09<\u002Fspan>주소 체계<\u002Fdiv>\n    <h1 class=\"slide-title\">IP 주소 <span class=\"sub\">— 기기의 숫자 주소<\u002Fspan><\u002Fh1>\n    <div class=\"twocol\">\n      <div>\n        <ul class=\"bullets\">\n          <li>인터넷에 연결된 모든 기기가 갖는 <span style=\"color:var(--accent);font-weight:600;\">숫자 주소<\u002Fspan> — 집 주소에 해당<\u002Fli>\n          <li>IPv4는 마침표로 나뉜 네 덩어리 — 각 칸은 <span class=\"mono\">0~255<\u002Fspan><\u002Fli>\n          <li>주소가 부족해 자릿수를 크게 늘린 <span class=\"mono\">IPv6<\u002Fspan> 도 함께 쓰임<\u002Fli>\n          <li>바깥에서 보이는 <span class=\"mono\">공인 IP<\u002Fspan> 와 내부망 전용 <span class=\"mono\">사설 IP<\u002Fspan> 로 나뉨<\u002Fli>\n          <li class=\"muted\">검색창에 \"내 IP\" 만 쳐도 내 공인 IP를 볼 수 있음<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"codecard\" style=\"font-size:20px;width:100%;\"><span class=\"com\">// IPv4 — 네 덩어리<\u002Fspan>\n<span class=\"str\">93.184.216.34<\u002Fspan>\n   └─ 0~255 · 약 43억 개\n\n<span class=\"com\">// IPv6 — 사실상 무한대<\u002Fspan>\n<span class=\"str\">2606:2800:220:1:248:1893:25c8:1946<\u002Fspan>\n\n<span class=\"com\">// 공인 vs 사설<\u002Fspan>\n공인 IP  <span class=\"str\">203.0.113.7<\u002Fspan>   인터넷에서 보이는 나\n사설 IP  <span class=\"str\">192.168.0.x<\u002Fspan>   내부망 전용<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer\"><span class=\"brand\">웹<\u002Fspan><span class=\"pageno\">15<span class=\"total\"> / 27<\u002Fspan><\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────── 주소체계 · PORT ───────── -->\n  <section data-screen-label=\"포트 번호\">\n    <div class=\"eyebrow\"><span class=\"num\">10<\u002Fspan>주소 체계<\u002Fdiv>\n    <h1 class=\"slide-title\">포트 번호 <span class=\"sub\">— 프로그램의 문<\u002Fspan><\u002Fh1>\n    <div class=\"twocol\">\n      <div>\n        <ul class=\"bullets\">\n          <li>한 컴퓨터(IP) 안에서 <span style=\"color:var(--accent);font-weight:600;\">어떤 프로그램<\u002Fspan>으로 갈지 고르는 번호<\u002Fli>\n          <li>IP가 건물 주소라면, 포트는 그 안의 <span class=\"mono\">호수 · 문 번호<\u002Fspan><\u002Fli>\n          <li>범위는 <span class=\"mono\">0~65535<\u002Fspan> — 웹은 보통 <code>80<\u002Fcode>(HTTP), <code>443<\u002Fcode>(HTTPS)<\u002Fli>\n          <li>서버는 특정 포트를 <span class=\"mono\">열어두고(listen)<\u002Fspan> 요청을 기다림<\u002Fli>\n          <li class=\"muted\">한 서버가 80 · 443 · 22 등 여러 포트를 동시에 열 수 있음<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"codecard\" style=\"font-size:20px;width:100%;\"><span class=\"com\">// IP : PORT<\u002Fspan>\n<span class=\"str\">93.184.216.34<\u002Fspan> : <span class=\"kw\">443<\u002Fspan>\n└──── 건물(IP) ────┘   └ 문(PORT)\n\n<span class=\"com\">// 자주 쓰는 포트<\u002Fspan>\n  <span class=\"kw\">80<\u002Fspan>     HTTP\n  <span class=\"kw\">443<\u002Fspan>    HTTPS\n  <span class=\"kw\">22<\u002Fspan>     SSH\n  <span class=\"kw\">3306<\u002Fspan>   MySQL<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer\"><span class=\"brand\">웹<\u002Fspan><span class=\"pageno\">16<span class=\"total\"> / 27<\u002Fspan><\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n<section data-screen-label=\"05 URL\" data-om-id=\"7e717c8b:285\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"3\">\n    <div class=\"eyebrow\" data-om-id=\"7e717c8b:286\"><span class=\"num\" data-om-id=\"7e717c8b:287\">11<\u002Fspan>주소 체계<\u002Fdiv>\n    <h1 class=\"slide-title\" data-om-id=\"7e717c8b:288\">URL <span class=\"sub\" data-om-id=\"7e717c8b:289\">— 자원의 주소<\u002Fspan><\u002Fh1>\n    <div class=\"url-block\" data-om-id=\"7e717c8b:290\">\n<span class=\"seg scheme\" data-om-id=\"7e717c8b:291\">https<\u002Fspan>://<span class=\"seg host\" data-om-id=\"7e717c8b:292\">example.com<\u002Fspan>:<span class=\"seg port\" data-om-id=\"7e717c8b:293\">443<\u002Fspan><span class=\"seg path\" data-om-id=\"7e717c8b:294\">/study/web<\u002Fspan>?<span class=\"seg query\" data-om-id=\"7e717c8b:295\">id=03<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"url-legend\" data-om-id=\"7e717c8b:296\">\n      <div class=\"item\" data-om-id=\"7e717c8b:297\"><div class=\"k s1\" data-om-id=\"7e717c8b:298\">scheme<\u002Fdiv><div class=\"v\" data-om-id=\"7e717c8b:299\">통신 규약<br data-om-id=\"7e717c8b:300\">(http / https)<\u002Fdiv><\u002Fdiv>\n      <div class=\"item\" data-om-id=\"7e717c8b:301\"><div class=\"k s2\" data-om-id=\"7e717c8b:302\">host<\u002Fdiv><div class=\"v\" data-om-id=\"7e717c8b:303\">대상 서버의 도메인<br data-om-id=\"7e717c8b:304\">(또는 IP)<\u002Fdiv><\u002Fdiv>\n      <div class=\"item\" data-om-id=\"7e717c8b:305\"><div class=\"k s3\" data-om-id=\"7e717c8b:306\">port<\u002Fdiv><div class=\"v\" data-om-id=\"7e717c8b:307\">서버의 어떤 문으로<br data-om-id=\"7e717c8b:308\">들어갈지 (생략 시 기본)<\u002Fdiv><\u002Fdiv>\n      <div class=\"item\" data-om-id=\"7e717c8b:309\"><div class=\"k s4\" data-om-id=\"7e717c8b:310\">path<\u002Fdiv><div class=\"v\" data-om-id=\"7e717c8b:311\">서버 안의 어떤 자원<br data-om-id=\"7e717c8b:312\">(파일·라우트)<\u002Fdiv><\u002Fdiv>\n      <div class=\"item\" data-om-id=\"7e717c8b:313\"><div class=\"k s5\" data-om-id=\"7e717c8b:314\">query<\u002Fdiv><div class=\"v\" data-om-id=\"7e717c8b:315\">부가 파라미터<br data-om-id=\"7e717c8b:316\">(검색어, 필터 …)<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <ul class=\"bullets\" style=\"margin-top:40px;\" data-om-id=\"7e717c8b:317\">\n      <li data-om-id=\"7e717c8b:318\">도메인은 사람이 외우는 이름 — 실제 통신은 <span class=\"mono\" data-om-id=\"7e717c8b:319\">IP 주소<\u002Fspan>로 함<\u002Fli>\n      <li data-om-id=\"7e717c8b:320\">도메인을 IP로 바꿔주는 시스템이 <span style=\"color:var(--accent);font-weight:600;\" data-om-id=\"7e717c8b:321\">DNS<\u002Fspan><\u002Fli>\n    <\u002Ful>\n    <div class=\"footer\" data-om-id=\"7e717c8b:322\">\n      <span class=\"brand\" data-om-id=\"7e717c8b:323\">웹<\u002Fspan>\n      <span class=\"pageno\" data-om-id=\"7e717c8b:324\">17<span class=\"total\" data-om-id=\"7e717c8b:325\"> / 27<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection><section data-screen-label=\"12 DNS\" id=\"dns-slide\" data-om-id=\"7e717c8b:560\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"10\">\n    <style>\n      #dns-slide .dns-call { width:100%; max-width:560px; background:var(--code-bg); border:1px solid var(--rule); border-radius:14px; padding:24px; display:flex; flex-direction:column; gap:16px; min-height:460px; box-sizing:border-box; }\n      #dns-slide .dc-status { display:flex; align-items:center; gap:11px; font-family:var(--font-mono); font-size:16px; color:var(--fg-soft); background:#fff; border:1px solid var(--rule); border-radius:10px; padding:13px 16px; }\n      #dns-slide .dc-status .dot { width:9px; height:9px; border-radius:50%; background:#c8c2b8; flex:none; }\n      #dns-slide .dc-status.live .dot { background:#1f8a4c; =\"mono\">93.184.216.34<\u002Fspan> 라고 답해줌<\u002Fli>\n          <li>한 명이 다 외우는 게 아니라 — 상위 안내 → 지역 안내로 이어 물어봄(계층적)<\u002Fli>\n          <li>받은 주소는 잠깐 메모해 둠(<span class=\"mono\">캐시<\u002Fspan>) — 매번 전화하지 않아도 됨<\u002Fli>\n          <li class=\"muted\">터미널의 <code>nslookup<\u002Fcode> · <code>dig<\u002Fcode> 가 바로 이 \"전화 걸기\"<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"dns-call\" id=\"dns-call\">\n          <div class=\"dc-status\" id=\"dc-status\">\n            <span class=\"dot\"><\u002Fspan>\n            <svg class=\"dc-ic\" viewBox=\"0 0 24 24\" width=\"18\" height=\"18\"><path d=\"M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.3 1.1.4 2.3.6 3.6.6.6 0 1 .5 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.5.6 3.6.1.4 0 .8-.3 1l-2.3 2.2z\" fill=\"#7a756c\"><\u002Fpath><\u002Fsvg>\n            <span id=\"dc-status-text\">1.1.1.1 — DNS에 전화 거는 중…<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"dc-thread\">\n            <div class=\"dc-bubble me\" id=\"dc-q\">example.com 주소가 어떻게 돼요?<\u002Fdiv>\n            <div class=\"dc-bubble op\" id=\"dc-a\">\n              <div class=\"dc-op-name\">114 · DNS 안내원<\u002Fdiv>\n              <div class=\"dc-op-text\" id=\"dc-a-text\">잠시만요, 찾아볼게요…<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"dc-got\" id=\"dc-got\">✓ 93.184.216.34 받았어요 — 이제 이 주소로 연결<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer\" data-om-id=\"7e717c8b:584\">\n      <span class=\"brand\" data-om-id=\"7e717c8b:585\">웹<\u002Fspan>\n      <span class=\"pageno\" data-om-id=\"7e717c8b:586\">18<span class=\"total\" data-om-id=\"7e717c8b:587\"> / 27<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <script>\n    (function () {\n      var sec = document.getElementById('dns-slide'); if (!sec) return;\n      var st = document.getElementById('dc-status'), stt = document.getElementById('dc-status-text');\n      var q = document.getElementById('dc-q'), a = document.getElementById('dc-a'), at = document.getElementById('dc-a-text'), got = document.getElementById('dc-got');\n      var timers = [];\n      function clearAll(){ timers.forEach(clearTimeout); timers = []; }\n      function reset(){ st.classList.remove('live'); stt.textContent = '1.1.1.1 — DNS에 전화 거는 중…'; q.classList.remove('show'); a.classList.remove('show'); got.classList.remove('show'); at.innerHTML = '잠시만요, 찾아볼게요…'; }\n      function run(){\n        clearAll(); reset();\n        timers.push(setTimeout(function(){ st.classList.add('live'); stt.textContent = '연결됨 — 통화 중'; }, 900));\n        timers.push(setTimeout(function(){ q.classList.add('show'); }, 1400));\n        timers.push(setTimeout(function(){ a.classList.add('show'); }, 2700));\n        timers.push(setTimeout(function(){ at.innerHTML = '네, <span class=\\\"ip\\\">93.184.216.34<\u002Fspan> 입니다'; }, 4300));\n        timers.push(setTimeout(function(){ got.classList.add('show'); }, 5300));\n        timers.push(setTimeout(function(){ run(); }, 8200));\n      }\n      var mo = new MutationObserver(function(){ if (sec.hasAttribute('data-deck-active')) run(); else clearAll(); });\n      mo.observe(sec, { attributes: true, attributeFilter: ['data-deck-active'] });\n      if (sec.hasAttribute('data-deck-active')) run(); else reset();\n    })();\n    <\u002Fscript>\n  <\u002Fsection>\n\n  <!-- ───────── 10  클라이언트 OS ───────── -->\n    <!-- ───────── PART 04 divider (HTTP) ───────── -->\n  <section data-screen-label=\"PART 04\" class=\"divider\">\n    <div class=\"chap\">PART 04<\u002Fdiv>\n    <h1>HTTP<br>요청의 형식<\u002Fh1>\n    <p class=\"desc\">\n      주소로 서버를 찾았다면 — 이제 \"무엇을, 어떻게\" 할지를 HTTP로 말한다.<br>\n      가져올 땐 GET, 보낼 땐 POST. 그리고 헤더에 부가 정보를 담는다.\n    <\u002Fp>\n    <div class=\"footer\"><span class=\"brand\">웹<\u002Fspan><span class=\"pageno\">19<span class=\"total\"> / 27<\u002Fspan><\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────── HTT om-id=\"7e717c8b:517\">← PREV<\u002Fbutton>\n          <button id=\"btn-play\" class=\"primary\" data-om-id=\"7e717c8b:518\">▶ PLAY<\u002Fbutton>\n          <button id=\"btn-next\" data-om-id=\"7e717c8b:519\">NEXT →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"footer\" data-om-id=\"7e717c8b:520\">\n      <span class=\"brand\" data-om-id=\"7e717c8b:521\">웹<\u002Fspan>\n      <span class=\"pageno\" data-om-id=\"7e717c8b:522\">25<span class=\"total\" data-om-id=\"7e717c8b:523\"> / 27<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ───────── 08  브라우저 ───────── -->\n  <section data-screen-label=\"27 정리\" data-om-id=\"7e717c8b:1080\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"25\">\n    <div class=\"eyebrow\" data-om-id=\"7e717c8b:1081\"><span class=\"num\" data-om-id=\"7e717c8b:1082\">18<\u002Fspan>요약<\u002Fdiv>\n    <h1 class=\"slide-title\" data-om-id=\"7e717c8b:1083\">정리<\u002Fh1>\n    <ul class=\"bullets\" data-om-id=\"7e717c8b:1084\">\n      <li data-om-id=\"7e717c8b:1085\">웹 = 클라이언트가 <code data-om-id=\"7e717c8b:1086\">URL<\u002Fcode> 로 서버를 가리키고 <code data-om-id=\"7e717c8b:1087\">HTTP<\u002Fcode> 로 대화하는 구조<\u002Fli>\n      <li data-om-id=\"7e717c8b:1088\">서버가 보내는 본문이 <span style=\"color:var(--accent);font-weight:600;\" data-om-id=\"7e717c8b:1089\">HTML<\u002Fspan> — 위에 <span style=\"color:var(--accent);font-weight:600;\" data-om-id=\"7e717c8b:1090\">CSS<\u002Fspan> 로 모양, <span style=\"color:var(--accent);font-weight:600;\" data-om-id=\"7e717c8b:1091\">JS<\u002Fspan> 로 동작<\u002Fli>\n      <li data-om-id=\"7e717c8b:1092\">요청은 <span class=\"mono\" data-om-id=\"7e717c8b:1093\">DNS → 소켓 → OS → NIC → 공유기 → 인터넷 → 서버<\u002Fspan> 의 긴 사슬을 거침<\u002Fli>\n      <li data-om-id=\"7e717c8b:1094\">각 계층은 자기 헤더를 붙였다 떼는 단순한 일을 함 — 그게 쌓여 통신이 됨<\u002Fli>\n      <li class=\"muted\" data-om-id=\"7e717c8b:1095\">다음 시간엔 우리가 직접 서버를 띄워 응답을 만들어볼 예정<\u002Fli>\n    <\u002Ful>\n    <div class=\"footer\" data-om-id=\"7e717c8b:1096\">\n      <span class=\"brand\" data-om-id=\"7e717c8b:1097\">웹<\u002Fspan>\n      <span class=\"pageno\" data-om-id=\"7e717c8b:1098\">26<span class=\"total\" data-om-id=\"7e717c8b:1099\"> / 27<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ───────── 15  END ───────── -->\n  <section data-screen-label=\"28 END\" class=\"divider\" data-om-id=\"7e717c8b:1100\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"26\" data-deck-last-visible=\"\">\n    <div class=\"chap\" data-om-id=\"7e717c8b:1101\">END · STUDY 03<\u002Fdiv>\n    <h1 data-om-id=\"7e717c8b:1102\">질문<br data-om-id=\"7e717c8b:1103\">받겠습니다<\u002Fh1>\n    <p class=\"desc\" data-om-id=\"7e717c8b:1104\">\n      이번 시간엔 웹의 구조와 요청이 도달하는 경로를 봤습니다.<br data-om-id=\"7e717c8b:1105\">\n      다음엔 직접 서버를 띄우고, 첫 응답을 만들어봅니다.\n    <\u002Fp>\n    <div class=\"footer\" data-om-id=\"7e717c8b:1106\">\n      <span class=\"brand\" data-om-id=\"7e717c8b:1107\">웹<\u002Fspan>\n      <span class=\"pageno\" data-om-id=\"7e717c8b:1108\">27<span class=\"total\" data-om-id=\"7e717c8b:1109\"> / 27<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<script>\n  // ─── Animation logic ──────────────────────────────────────\n  (function () {\n    const STEPS = [\n      {\n        node: 1,\n        wires: [],\n        title: \"주소창에 URL 입력\",\n        desc: \"사용자가 브라우저에 <code>https://example.com<\u002Fcode> 을 입력. 브라우저는 먼저 도메인을 IP로 바꿀 준비를 함.\"\n      },\n      {\n        node: 2,\n        wires: [\"wire-1-2\"],\n        title: \"DNS 조회 — 도메인 → IP\",\n        desc: \"브라우저가 OS의 DNS 리졸버에 질의. <code>example.com<\u002Fcode> 의 IP <code>93.184.216.34<\u002Fcode> 를 받아옴.\"\n      },\n      {\n        node: 3,\n        wires: [\"wire-1-2\", \"wire-2-3\"],\n        title: \"클라이언트 소켓 생성 · TCP 핸드셰이크\",\n        desc: \"OS에 <code>socket()<\u002Fcode> · <code>connect()<\u002Fcode> 호출. 서버와 SYN/SYN-ACK/ACK 로 연결을 맺고 HTTP 요청 데이터를 만듦.\"\n      },\n      {\n        node: 3,\n        wires: [\"wire-1-2\", \"wire-2-3\"],\n        title: \"OS 커널 — 패킷 캡슐화\",\n        desc: \"HTTP 본문 위에 <code>TCP 헤더<\u002Fcode>, 그 위에 <code>IP 헤더<\u002Fcode>, 다시 <code>Ethernet 헤더<\u002Fcode> 를 차례로 붙여 한 장의 패킷으로 포장.\"\n      },\n      {\n        node: 4,\n        wires: [\"wire-1-2\", \"wire-2-3\", \"wire-3-4\"],\n        title: \"NIC(랜포트)로 송출\",\n        desc: \"OS가 패킷을 NIC 드라이버에 넘김. NIC는 비트를 전기 신호로 바꿔 랜선으로 내보냄.\"\n      },\n      {\n        node: 5,\n        wires: [\"wire-1-2\", \"wire-2-3\", \"wire-3-4\", \"wire-4-5\"],\n        title: \"랜선 → 공유기(홈 라우터)\",\n        desc: \"공유기는 사설 IP를 공인 IP로 변환(<code>NAT<\u002Fcode>)하고, ISP 쪽으로 패킷을 전달.\"\n      },\n      {\n        node: 6,\n        wires: [\"wire-1-2\", \"wire-2-3\", \"wire-3-4\", \"wire-4-5\", \"wire-5-6\"],\n        title: \"ISP · 인터넷 백본\",\n        desc: \"ISP 라우터에서 백본 라우터로, 여러 hop 을 거치며 목적지 IP에 가까운 방향으로 전달됨. 매 hop 마다 라우팅 테이블을 보고 다음 길을 정함.\"\n      },\n      {\n        node: 7,\n        wires: [\"wire-1-2\", \"wire-2-3\", \"wire-3-4\", \"wire-4-5\", \"wire-5-6\", \"wire-6-7\"],\n        title: \"데이터센터 도착\",\n        desc: \"목적지 IP의 데이터센터에 도착. L3 라우터 → 스위치를 거쳐 해당 서버 머신으로 향함.\"\n      },\n      {\n        node: 8,\n        wires: [\"wire-1-2\", \"wire-2-3\", \"wire-3-4\", \"wire-4-5\", \"wire-5-6\", \"wire-6-7\", \"wire-7-8\"],\n        title: \"서버 NIC가 패킷 수신\",\n        desc: \"서버의 NIC가 전기 신호를 다시 비트로 복원. OS 커널에게 인터럽트를 걸어 패킷을 넘김.\"\n      },\n      {\n        node: 9,\n        wires: [\"wire-1-2\", \"wire-2-3\", \"wire-3-4\", \"wire-4-5\", \"wire-5-6\", \"wire-6-7\", \"wire-7-8\", \"wire-8-9\"],\n        title: \"서버 OS — 역캡슐화 · 포트 매칭\",\n        desc: \"Ethernet · IP · TCP 헤더를 차례로 벗겨내고, 목적지 포트(:443)를 보고 해당 포트에 <code>listen<\u002Fcode> 중인 웹서버 소켓에 전달.\"\n      },\n      {\n        node: 10,\n        wires: [\"wire-1-2\", \"wire-2-3\", \"wire-3-4\", \"wire-4-5\", \"wire-5-6\", \"wire-6-7\", \"wire-7-8\", \"wire-8-9\", \"wire-9-10\"],\n        title: \"웹서버 프로세스에 도착\",\n        desc: \"nginx · node 같은 웹서버가 <code>accept()<\u002Fcode> 한 연결에서 HTTP 요청을 파싱. 라우팅 → 응답 생성 → 같은 길을 거꾸로 되돌아감.\"\n      }\n    ];\n\n    const TOTAL = STEPS.length;\n    (function(){ const e = document.getElementById(\"step-num\"); if (e && e.nextElementSibling) e.nextElementSibling.textContent = \" / \" + String(TOTAL).padStart(2, \"0\"); })();\n    let cur = 0;\n    let playTimer = null;\n\n    const svg = document.getElementById(\"path-svg\");\n\n    // Center points (in viewBox coords) for the packet position when at a node\n    const NODE_CENTER = {\n      1:  [135, 72],\n      2:  [365, 72],\n      3:  [595, 72],\n      4:  [825, 72],\n      5:  [1045, 72],\n      6:  [1290, 72],\n      7:  [1545, 72],\n      8:  [1545, 302],\n      9:  [1290, 302],\n      10: [1040, 302],\n    };\n\n    const packet = document.getElementById(\"packet-g\");\n\n    function clearAll() {\n      svg.querySelectorAll(\".node\").forEach(n => n.classList.remove(\"active\", \"passed\"));\n      svg.querySelectorAll(\".wire\").forEach(w => w.classList.remove(\"passed\"));\n    }\n\n    function applyStep(i) {\n      const s = STEPS[i];\n      clearAll();\n\n      // mark prior nodes as passed\n      for (let k = 0; k < i; k++) {\n        const past = svg.getElementById(\"node-\" + STEPS[k].node);\n        if (past) past.classList.add(\"passed\");\n      }\n      // current\n      const curNode = svg.getElementById(\"node-\" + s.node);\n      if (curNode) curNode.classList.add(\"active\");\n\n      // wires\n      s.wires.forEach(id => {\n        const w = svg.getElementById(id);\n        if (w) w.classList.add(\"passed\");\n      });\n\n      // packet position\n      const [x, y] = NODE_CENTER[s.node];\n      packet.setAttribute(\"transform\", `translate(${x} ${y})`);\n\n      // step bar\n      document.getElementById(\"step-num\").textContent = String(i + 1).padStart(2, \"0\");\n      document.getElementById(\"step-title\").textContent = s.title;\n      document.getElementById(\"step-desc\").innerHTML = s.desc;\n    }\n\n    function next() { cur = (cur + 1) % TOTAL; applyStep(cur); }\n    function prev() { cur = (cur - 1 + TOTAL) % TOTAL; applyStep(cur); }\n\n    function play() {\n      if (playTimer) { stop(); return; }\n      const btn = document.getElementById(\"btn-play\");\n      btn.textContent = \"■ PAUSE\";\n      playTimer = setInterval(() => {\n        if (cur >= TOTAL - 1) { stop(); return; }\n        next();\n      }, 1600);\n    }\n    function stop() {\n      if (playTimer) { clearInterval(playTimer); playTimer = null; }\n      document.getElementById(\"btn-play\").textContent = \"▶ PLAY\";\n    }\n\n    document.getElementById(\"btn-next\").addEventListener(\"click\", () => { stop(); next(); });\n    document.getElementById(\"btn-prev\").addEventListener(\"click\", () => { stop(); prev(); });\n    document.getElementById(\"btn-play\").addEventListener(\"click\", play);\n\n    // initial\n    applyStep(0);\n  })();\n<\u002Fscript>\n\n<script>\n  // ─── HTML/CSS/JS slides: code ↔ preview interactive linking ───\n  (function () {\n    function wire(rootId, opts) {\n      var root = document.getElementById(rootId);\n      if (!root) return;\n      var codeLines = root.querySelectorAll('.cp-code .cl[data-ref]');\n      var els = root.querySelectorAll('.bp-page [data-el]');\n\n      function setHL(ref, on) {\n        root.querySelectorAll('.bp-page [data-el=\"' + ref + '\"]').forEach(function (e) {\n          e.classList.toggle('hl', on);\n        });\n        root.querySelectorAll('.cp-code .cl[data-ref=\"' + ref + '\"]').forEach(function (c) {\n          c.classList.toggle('lit', on);\n        });\n      }\n\n      codeLines.forEach(function (line) {\n        var ref = line.getAttribute('data-ref');\n        line.addEventListener('mouseenter', function () { setHL(ref, true); });\n        line.addEventListener('mouseleave', function () { setHL(ref, false); });\n      });\n      els.forEach(function (el) {\n        var ref = el.getAttribute('data-el');\n        el.addEventListener('mouseenter', function () { setHL(ref, true); });\n        el.addEventListener('mouseleave', function () { setHL(ref, false); });\n      });\n\n      if (opts && opts.onReady) opts.onReady(root, setHL);\n    }\n\n    wire('demo-html');\n\n    // CSS slide: style ON/OFF toggle\n    wire('demo-css', function () {});\n    (function () {\n      var btn = document.getElementById('css-toggle');\n      if (!btn) return;\n      var page = document.querySelector('#demo-css .bp-page');\n      btn.addEventListener('click', function () {\n        var on = btn.getAttribute('data-on') === 'true';\n        on = !on;\n        btn.setAttribute('data-on', String(on));\n        btn.textContent = on ? '스타일 ON' : '스타일 OFF';\n        page.classList.toggle('bp-nostyle', !on);\n      });\n    })();\n\n    // JS slide: real button behaviour + code flash\n    (function () {\n      var root = document.getElementById('demo-js');\n      if (!root) return;\n      var btn = root.querySelector('.bp-btn');\n      var count = root.querySelector('.bp-count');\n      var n = 0;\n      function flash(ref) {\n        root.querySelectorAll('.cp-code .cl[data-ref=\"' + ref + '\"]').forEach(function (c) {\n          c.classList.remove('flash');\n          void c.offsetWidth;\n          c.classList.add('flash');\n          setTimeout(function () { c.classList.remove('flash'); }, 360);\n        });\n      }\n      btn.addEventListener('click', function () {\n        n++;\n        count.textContent = n;\n        btn.classList.remove('pop'); void btn.offsetWidth; btn.classList.add('pop');\n        flash('btn'); setTimeout(function () { flash('count'); }, 90);\n      });\n    })();\n  })();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
